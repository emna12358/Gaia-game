<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAÏA — Le Gardien de la Terre</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: "EB Garamond", Georgia, serif;
        cursor: none;
      }

      /* ── CURSEUR ── */
      #cursor {
        position: fixed;
        width: 16px;
        height: 16px;
        border: 1px solid rgba(0, 255, 136, 0.75);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease;
      }
      #cursor::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 3px;
        background: #00ff88;
        border-radius: 50%;
      }

      /* ── COUCHES ── */
      #stars-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      #vfx-canvas {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      /* Vignette très douce — ne touche pas le centre */
      #vignette {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        background: radial-gradient(
          ellipse 80% 80% at 50% 50%,
          transparent 38%,
          rgba(0, 0, 0, 0.32) 65%,
          rgba(0, 0, 0, 0.8) 100%
        );
      }

      /* ── LOADING ── */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        transition: opacity 1.4s ease;
      }
      #loading.hide {
        opacity: 0;
        pointer-events: none;
      }
      #loading-label {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.45em;
        color: rgba(0, 255, 136, 0.5);
      }
      #loading-track {
        width: 220px;
        height: 2px;
        background: rgba(0, 255, 136, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-fill {
        height: 100%;
        width: 0%;
        background: #00ff88;
        border-radius: 2px;
        transition: width 0.4s ease;
      }

      /* ── ÉCRAN DÉMARRAGE ── */
      #start-screen {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: opacity 2s ease;
      }
      #start-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #start-title {
        font-family: "Cinzel", serif;
        font-size: clamp(52px, 9vw, 92px);
        font-weight: 600;
        color: #00ff88;
        letter-spacing: 0.4em;
        animation: glow-pulse 2.5s ease-in-out infinite;
      }
      @keyframes glow-pulse {
        0%,
        100% {
          text-shadow: 0 0 28px rgba(0, 255, 136, 0.5),
            0 0 65px rgba(0, 255, 136, 0.2);
        }
        50% {
          text-shadow: 0 0 65px rgba(0, 255, 136, 0.95),
            0 0 130px rgba(0, 255, 136, 0.5), 0 0 200px rgba(0, 255, 136, 0.2);
        }
      }
      #start-sub {
        margin-top: 10px;
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.5em;
        color: rgba(0, 255, 136, 0.28);
      }
      #start-hint {
        margin-top: 58px;
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.45em;
        color: rgba(0, 255, 136, 0.42);
        animation: hint-blink 2s ease-in-out infinite;
      }
      @keyframes hint-blink {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.95;
        }
      }

      /* ── TOP LOGO ── */
      #top-logo {
        position: fixed;
        top: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.55em;
        color: rgba(0, 255, 136, 0.25);
        opacity: 0;
        transition: opacity 2.5s ease;
      }
      #top-logo.show {
        opacity: 1;
      }

      /* ══════════════════════════════════════════
       OVERLAY TEXTE — centré, ne dépasse JAMAIS
       ══════════════════════════════════════════ */
      #overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Padding vertical pour ne jamais toucher les bords */
        padding: clamp(60px, 8vh, 100px) 20px clamp(40px, 6vh, 80px);
        pointer-events: none;
        /* Empêche tout dépassement */
        overflow: hidden;
      }

      /* Lignes décoratives */
      .sep {
        width: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 136, 0.5),
          transparent
        );
        transition: width 1.6s ease;
        flex-shrink: 0;
      }
      .sep.show {
        width: min(500px, 80vw);
      }

      /* Boîte texte — taille adaptative, jamais overflow */
      #text-box {
        max-width: 560px;
        width: min(88vw, 560px);
        /* max-height relatif à la fenêtre pour s'adapter à tous les écrans */
        max-height: calc(100vh - clamp(160px, 22vh, 220px));
        margin: 12px 0;
        padding: clamp(18px, 3vh, 28px) clamp(22px, 4vw, 38px)
          clamp(16px, 2.5vh, 24px);
        background: rgba(0, 4, 2, 0.82);
        border: 1px solid rgba(0, 255, 136, 0.13);
        backdrop-filter: blur(18px);
        border-radius: 2px;
        opacity: 0;
        transform: translateY(22px);
        transition: opacity 1.1s ease, transform 1.1s ease;
        pointer-events: all;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
        /* Scroll interne si vraiment nécessaire, discret */
        overflow-y: auto;
        scrollbar-width: none;
      }
      #text-box::-webkit-scrollbar {
        display: none;
      }
      #text-box.show {
        opacity: 1;
        transform: translateY(0);
      }

      #speaker-tag {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.45em;
        color: rgba(0, 255, 136, 0.38);
        margin-bottom: 14px;
        text-align: center;
      }

      /* Texte centré, taille fluide, jamais de min-height */
      #typewriter {
        font-family: "EB Garamond", serif;
        font-size: clamp(13px, 1.7vw, 16px);
        line-height: 1.95;
        color: #caeedd;
        white-space: pre-wrap;
        /* SUPPRESSION du min-height qui causait le dépassement */
        text-align: center;
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.85), 0 0 25px rgba(0, 0, 0, 0.6);
      }

      #tw-cur {
        display: inline-block;
        width: 2px;
        height: 16px;
        background: #00ff88;
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      #btn-continue {
        display: block;
        margin: 24px auto 0;
        padding: 12px 40px;
        background: transparent;
        border: 1px solid rgba(0, 255, 136, 0.38);
        color: rgba(0, 255, 136, 0.72);
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.9s ease, background 0.3s, box-shadow 0.3s;
      }
      #btn-continue.show {
        opacity: 1;
        pointer-events: all;
      }
      #btn-continue:hover {
        background: rgba(0, 255, 136, 0.07);
        box-shadow: 0 0 26px rgba(0, 255, 136, 0.22);
      }

      /* ── AUDIO ── */
      #audio-hint {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 30;
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.3em;
        color: rgba(0, 255, 136, 0.25);
        cursor: pointer;
        transition: color 0.3s;
      }
      #audio-hint:hover {
        color: rgba(0, 255, 136, 0.7);
      }

      /* ── RIDEAU DE TRANSITION ── */
      #curtain {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.6s ease;
      }
      #curtain.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <!-- Loading -->
    <div id="loading">
      <div id="loading-label">CHARGEMENT DE LA TERRE...</div>
      <div id="loading-track"><div id="loading-fill"></div></div>
    </div>

    <!-- Curseur -->
    <div id="cursor"></div>

    <!-- Étoiles -->
    <canvas id="stars-canvas"></canvas>

    <!-- Globe 3D -->
    <div id="canvas-container"></div>

    <!-- VFX particules -->
    <canvas id="vfx-canvas"></canvas>

    <!-- Vignette -->
    <div id="vignette"></div>

    <!-- Logo -->
    <div id="top-logo">G A Ï A — G A R D I E N D E L A T E R R E</div>

    <!-- Écran démarrage -->
    <div id="start-screen" onclick="startExperience()">
      <div id="start-title">GAÏA</div>
      <div id="start-sub">LE GARDIEN DE LA TERRE</div>
      <div id="start-hint">— CLIQUEZ POUR COMMENCER —</div>
    </div>

    <!-- Overlay texte centré -->
    <div id="overlay">
      <div class="sep" id="sep-top"></div>
      <div id="text-box">
        <div id="speaker-tag">G A Ï A</div>
        <div id="typewriter"></div>
        <span id="tw-cur"></span>
        <button id="btn-continue" onclick="goToScene2()">
          ▶ &nbsp;Devenir le Gardien
        </button>
      </div>
      <div class="sep" id="sep-bot"></div>
    </div>

    <!-- Rideau transition -->
    <div id="curtain"></div>

    <!-- Audio -->
    <div id="audio-hint" onclick="toggleMute()">🔊 SON</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      /* ═══════════════════════════════════════════
   GAÏA — SCÈNE 1
   Corrections :
   - Atmosphère mince (rayon 1.06, fr^7)
   - Halo vert supprimé côtés
   - Texte centré + ombre lisibilité
   - Transition fluide vers scène 2
   ═══════════════════════════════════════════ */

      // ── CURSEUR ──────────────────────────────────
      const cur = document.getElementById("cursor");
      document.addEventListener("mousemove", (e) => {
        cur.style.left = e.clientX + "px";
        cur.style.top = e.clientY + "px";
      });

      // ── AUDIO ────────────────────────────────────
      let audioCtx = null,
        isMuted = false,
        heartInterval = null;

      function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function getMaster() {
        if (!audioCtx) return null;
        if (!window._m1) {
          const c = audioCtx.createDynamicsCompressor();
          c.threshold.value = -20;
          c.knee.value = 8;
          c.ratio.value = 3;
          c.attack.value = 0.003;
          c.release.value = 0.25;
          c.connect(audioCtx.destination);
          window._m1 = c;
        }
        return window._m1;
      }

      function makeReverb(dur = 3, decay = 2.5) {
        if (!audioCtx) return null;
        const sr = audioCtx.sampleRate,
          len = sr * dur;
        const buf = audioCtx.createBuffer(2, len, sr);
        for (let c = 0; c < 2; c++) {
          const d = buf.getChannelData(c);
          for (let i = 0; i < len; i++)
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        const cv = audioCtx.createConvolver();
        cv.buffer = buf;
        return cv;
      }

      function playWind() {
        if (!audioCtx || isMuted) return;
        const m = getMaster(),
          rv = makeReverb(4, 2.8);
        rv.connect(m);
        // Drone spatial multi-couches
        [36, 54, 72, 36.1].forEach((f, i) => {
          const o = audioCtx.createOscillator(),
            g = audioCtx.createGain();
          o.type = "sine";
          o.frequency.value = f;
          g.gain.setValueAtTime(0, audioCtx.currentTime);
          g.gain.linearRampToValueAtTime(
            [0.035, 0.02, 0.012, 0.025][i],
            audioCtx.currentTime + 4 + i * 0.4
          );
          o.connect(g);
          g.connect(rv);
          g.connect(m);
          o.start();
        });
        // Vent filtré
        const nb = audioCtx.createBuffer(
          1,
          audioCtx.sampleRate * 4,
          audioCtx.sampleRate
        );
        const nd = nb.getChannelData(0);
        for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
        const ns = audioCtx.createBufferSource();
        ns.buffer = nb;
        ns.loop = true;
        const nf = audioCtx.createBiquadFilter();
        nf.type = "bandpass";
        nf.frequency.value = 320;
        nf.Q.value = 0.2;
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0, audioCtx.currentTime);
        ng.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 5);
        ns.connect(nf);
        nf.connect(ng);
        ng.connect(rv);
        ns.start();
      }

      function playHeartbeat() {
        if (!audioCtx || isMuted) return;
        const m = getMaster();
        function beat() {
          if (!audioCtx || isMuted) return;
          function thump(freq, vol, dur, delay) {
            setTimeout(() => {
              if (!audioCtx || isMuted) return;
              const o = audioCtx.createOscillator(),
                g = audioCtx.createGain();
              const dist = audioCtx.createWaveShaper();
              const curve = new Float32Array(256);
              for (let i = 0; i < 256; i++) {
                const x = (i * 2) / 256 - 1;
                curve[i] = ((Math.PI + 80) * x) / (Math.PI + 80 * Math.abs(x));
              }
              dist.curve = curve;
              o.type = "sine";
              o.frequency.value = freq;
              o.frequency.setValueAtTime(freq * 1.15, audioCtx.currentTime);
              o.frequency.exponentialRampToValueAtTime(
                freq * 0.88,
                audioCtx.currentTime + dur * 0.4
              );
              g.gain.setValueAtTime(vol, audioCtx.currentTime);
              g.gain.exponentialRampToValueAtTime(
                0.001,
                audioCtx.currentTime + dur
              );
              o.connect(dist);
              dist.connect(g);
              g.connect(m);
              o.start();
              o.stop(audioCtx.currentTime + dur);
            }, delay);
          }
          thump(52, 0.42, 0.32, 0);
          thump(44, 0.24, 0.26, 210);
        }
        beat();
        heartInterval = setInterval(beat, 1350);
      }

      function toggleMute() {
        isMuted = !isMuted;
        document.getElementById("audio-hint").textContent = isMuted
          ? "🔇 MUET"
          : "🔊 SON";
        if (audioCtx) isMuted ? audioCtx.suspend() : audioCtx.resume();
      }

      // ── ÉTOILES ──────────────────────────────────
      function initStars() {
        const c = document.getElementById("stars-canvas");
        c.width = innerWidth;
        c.height = innerHeight;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, c.width, c.height);
        for (let i = 0; i < 350; i++) {
          const x = Math.random() * c.width,
            y = Math.random() * c.height;
          const r = Math.random() * 1.05,
            o = Math.random() * 0.65 + 0.1;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${o})`;
          ctx.fill();
        }
      }

      // ── VFX PARTICULES ───────────────────────────
      function initVFX() {
        const c = document.getElementById("vfx-canvas");
        c.width = innerWidth;
        c.height = innerHeight;
        const ctx = c.getContext("2d");
        const pts = Array.from({ length: 55 }, () => ({
          x: Math.random() * c.width,
          y: Math.random() * c.height,
          r: Math.random() * 0.7 + 0.2,
          s: Math.random() * 0.16 + 0.05,
          o: Math.random() * 0.22 + 0.04,
          d: (Math.random() - 0.5) * 0.2,
        }));
        (function frame() {
          requestAnimationFrame(frame);
          ctx.clearRect(0, 0, c.width, c.height);
          pts.forEach((p) => {
            p.y -= p.s;
            p.x += p.d;
            if (p.y < 0) {
              p.y = c.height;
              p.x = Math.random() * c.width;
            }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,255,136,${p.o})`;
            ctx.fill();
          });
        })();
      }

      // ── THREE.JS ─────────────────────────────────
      let scene, camera, renderer, earth, clouds, clock;
      let sc = 0.001,
        scTarget = 0,
        op = 0;

      function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          48,
          innerWidth / innerHeight,
          0.1,
          1000
        );
        camera.position.z = 3.2;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        document
          .getElementById("canvas-container")
          .appendChild(renderer.domElement);
        clock = new THREE.Clock();

        const loader = new THREE.TextureLoader();
        const BASE =
          "https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/";
        let loaded = 0;
        function onLoad() {
          loaded++;
          document.getElementById("loading-fill").style.width =
            Math.round((loaded / 4) * 100) + "%";
          if (loaded >= 4) {
            setTimeout(() => {
              document.getElementById("loading").classList.add("hide");
              setTimeout(
                () =>
                  (document.getElementById("loading").style.display = "none"),
                1400
              );
            }, 400);
          }
        }

        const tE = loader.load(
          BASE + "earth_atmos_2048.jpg",
          onLoad,
          undefined,
          onLoad
        );
        const tN = loader.load(
          BASE + "earth_normal_2048.jpg",
          onLoad,
          undefined,
          onLoad
        );
        const tS = loader.load(
          BASE + "earth_specular_2048.jpg",
          onLoad,
          undefined,
          onLoad
        );
        const tC = loader.load(
          BASE + "earth_clouds_1024.png",
          onLoad,
          undefined,
          onLoad
        );

        // Globe Terre
        earth = new THREE.Mesh(
          new THREE.SphereGeometry(1, 64, 64),
          new THREE.MeshPhongMaterial({
            map: tE,
            normalMap: tN,
            specularMap: tS,
            specular: new THREE.Color(0x1a3025),
            shininess: 18,
            transparent: true,
            opacity: 0,
          })
        );
        earth.scale.set(0.001, 0.001, 0.001);
        earth.rotation.y = -0.4;
        scene.add(earth);

        // Nuages
        clouds = new THREE.Mesh(
          new THREE.SphereGeometry(1.009, 64, 64),
          new THREE.MeshPhongMaterial({
            map: tC,
            transparent: true,
            opacity: 0,
            depthWrite: false,
          })
        );
        clouds.scale.set(0.001, 0.001, 0.001);
        scene.add(clouds);

        // ══ ATMOSPHÈRE CORRIGÉE ══
        // fr^7 = n'apparaît QUE sur le limbe extrême
        // rayon 1.06 = couche ultra-mince
        const atmMat = new THREE.ShaderMaterial({
          uniforms: { uOp: { value: 0 } },
          vertexShader: `
      varying vec3 vN,vP;
      void main(){
        vN=normalize(normalMatrix*normal); vP=position;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
      }`,
          fragmentShader: `
      uniform float uOp; varying vec3 vN,vP;
      void main(){
        vec3 vd=normalize(cameraPosition-vP);
        float fr=pow(1.-dot(vN,vd), 7.0);
        // Bleu très doux, seulement sur l'extrême bord
        gl_FragColor=vec4(.10,.46,.90, fr*.30*uOp);
      }`,
          transparent: true,
          side: THREE.BackSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });
        const atm = new THREE.Mesh(
          new THREE.SphereGeometry(1.06, 32, 32),
          atmMat
        );
        atm.scale.set(0.001, 0.001, 0.001);
        atm.name = "atm";
        scene.add(atm);

        // ══ HALO VERT GAÏA — ultra discret ══
        // fr^9 = pixel sur le bord uniquement, pas de débordement
        const glowMat = new THREE.ShaderMaterial({
          uniforms: { uOp: { value: 0 }, uT: { value: 0 } },
          vertexShader: `
      varying vec3 vN,vP;
      void main(){
        vN=normalize(normalMatrix*normal); vP=position;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
      }`,
          fragmentShader: `
      uniform float uOp,uT; varying vec3 vN,vP;
      void main(){
        vec3 vd=normalize(cameraPosition-vP);
        float fr=pow(1.-dot(vN,vd), 9.0);
        float p=sin(uT*.7)*.03+.97;
        gl_FragColor=vec4(0.,1.,.52, fr*.10*p*uOp);
      }`,
          transparent: true,
          side: THREE.BackSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });
        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(1.08, 32, 32),
          glowMat
        );
        glow.scale.set(0.001, 0.001, 0.001);
        glow.name = "glow";
        scene.add(glow);

        // Lumières
        const sun = new THREE.DirectionalLight(0xfff2d8, 1.8);
        sun.position.set(5, 2, 4);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x080c14, 0.4));
        const rim = new THREE.DirectionalLight(0x0a1a44, 0.15);
        rim.position.set(-4, -1, -3);
        scene.add(rim);

        // Particules orbitales
        const pGeo = new THREE.BufferGeometry();
        const N = 650,
          pP = new Float32Array(N * 3),
          pC = new Float32Array(N * 3),
          pSz = new Float32Array(N);
        for (let i = 0; i < N; i++) {
          const phi = Math.acos(-1 + (2 * i) / N),
            th = Math.sqrt(N * Math.PI) * phi;
          const r = 1.8 + Math.random() * 1.3;
          pP[i * 3] = r * Math.sin(phi) * Math.cos(th);
          pP[i * 3 + 1] = r * Math.sin(phi) * Math.sin(th);
          pP[i * 3 + 2] = r * Math.cos(phi);
          pC[i * 3] = 0;
          pC[i * 3 + 1] = 0.7 + Math.random() * 0.3;
          pC[i * 3 + 2] = 0.4 + Math.random() * 0.3;
          pSz[i] = Math.random() * 2 + 0.4;
        }
        pGeo.setAttribute("position", new THREE.BufferAttribute(pP, 3));
        pGeo.setAttribute("color", new THREE.BufferAttribute(pC, 3));
        pGeo.setAttribute("size", new THREE.BufferAttribute(pSz, 1));
        const pMat = new THREE.ShaderMaterial({
          uniforms: { uT: { value: 0 }, uOp: { value: 0 } },
          vertexShader: `attribute float size;attribute vec3 color;varying vec3 vC;uniform float uT;void main(){vC=color;vec3 p=position;float a=uT*.05+p.y*.06;float r=length(p.xz);p.x=cos(a)*r-sin(a)*p.z;p.z=sin(a)*r+cos(a)*p.z;vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=size*(155./-mv.z);gl_Position=projectionMatrix*mv;}`,
          fragmentShader: `uniform float uOp;varying vec3 vC;void main(){float d=length(gl_PointCoord-.5)*2.;float a=1.-smoothstep(.4,1.,d);gl_FragColor=vec4(vC,a*uOp);}`,
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          vertexColors: true,
        });
        scene.add(new THREE.Points(pGeo, pMat));
        window._pMat = pMat;

        window.addEventListener("resize", () => {
          camera.aspect = innerWidth / innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(innerWidth, innerHeight);
        });

        animate();
      }

      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        if (scTarget > 0) {
          sc += (scTarget - sc) * 0.022;
          op = Math.min(op + 0.007, 1);
          earth.scale.set(sc, sc, sc);
          clouds.scale.set(sc, sc, sc);
          earth.material.opacity = op;
          clouds.material.opacity = Math.min(op * 0.72, 0.72);
          ["atm", "glow"].forEach((n) => {
            const o = scene.getObjectByName(n);
            if (o) {
              o.scale.set(sc, sc, sc);
              o.material.uniforms.uOp.value = op;
            }
          });
          if (window._pMat)
            window._pMat.uniforms.uOp.value = Math.min(op * 0.5, 0.5);
        }

        if (earth) earth.rotation.y = t * 0.072;
        if (clouds) clouds.rotation.y = t * 0.092;
        const glow = scene.getObjectByName("glow");
        if (glow) glow.material.uniforms.uT.value = t;
        if (window._pMat) window._pMat.uniforms.uT.value = t;

        camera.position.x = Math.sin(t * 0.038) * 0.14;
        camera.position.y = Math.sin(t * 0.022) * 0.06;
        camera.lookAt(0, 0, 0);
        renderer.render(scene, camera);
      }

      // ── TYPEWRITER ───────────────────────────────
      const gaiaText = `"Depuis 4,5 milliards d'années, je veille.
Je suis le berceau de toute vie.
Je suis océans, forêts, montagnes, déserts.
Je suis... GAÏA.

Mais aujourd'hui, je souffre.
Mon cœur bat trop vite.
Mes poumons peinent à respirer.
Mon corps est blessé, empoisonné.

J'ai besoin... d'un Gardien.
Quelqu'un qui ose entrer en moi.
Voir ce que je ressens.
Comprendre ce qui me tue.
Et m'aider à guérir.

Ce Gardien... C'est VOUS."`;

      function startTypewriter() {
        document.getElementById("top-logo").classList.add("show");
        document.getElementById("sep-top").classList.add("show");
        document.getElementById("sep-bot").classList.add("show");
        document.getElementById("text-box").classList.add("show");
        const el = document.getElementById("typewriter");
        const c = document.getElementById("tw-cur");
        el.textContent = "";
        c.style.display = "inline-block";
        let i = 0;
        const iv = setInterval(() => {
          if (i < gaiaText.length) {
            el.textContent += gaiaText[i++];
          } else {
            clearInterval(iv);
            c.style.display = "none";
            setTimeout(
              () =>
                document.getElementById("btn-continue").classList.add("show"),
              700
            );
          }
        }, 42);
      }

      // ── DÉMARRAGE ────────────────────────────────
      function startExperience() {
        initAudio();
        playWind();
        const ss = document.getElementById("start-screen");
        ss.classList.add("fade-out");
        setTimeout(() => (ss.style.display = "none"), 2000);
        setTimeout(() => {
          scTarget = 1.0;
        }, 1000);
        setTimeout(() => {
          playHeartbeat();
        }, 3200);
        setTimeout(() => {
          startTypewriter();
        }, 4000);
      }

      // ══════════════════════════════════════════════
      // TRANSITION FLUIDE VERS SCÈNE 2
      // Rideau noir + fade audio + redirect
      // ══════════════════════════════════════════════
      function goToScene2() {
        if (heartInterval) clearInterval(heartInterval);

        // 1. Fade out audio progressif
        if (audioCtx && window._m1) {
          const g = audioCtx.createGain();
          // on fade le master vers 0 en 1.4s
          window._m1.disconnect();
          window._m1.connect(g);
          g.connect(audioCtx.destination);
          g.gain.setValueAtTime(1, audioCtx.currentTime);
          g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.4);
        }

        // 2. Rideau noir apparaît
        const curtain = document.getElementById("curtain");
        curtain.classList.add("show");

        // 3. Redirect après le rideau
        setTimeout(() => {
          window.location.href = "scene2.html";
        }, 1800);
      }

      // ── INIT ─────────────────────────────────────
      initStars();
      initVFX();
      initThree();
    </script>
  </body>
