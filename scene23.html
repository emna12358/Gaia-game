<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAIA - Memorial des Catastrophes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: "EB Garamond", Georgia, serif;
        cursor: none;
        color: #e8e8e8;
      }

      /* CURSEUR */
      #cursor {
        position: fixed;
        width: 18px;
        height: 18px;
        border: 1px solid rgba(255, 200, 100, 0.7);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: transform 0.1s ease, border-color 0.3s;
      }
      #cursor::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 4px;
        height: 4px;
        background: rgba(255, 180, 80, 0.9);
        border-radius: 50%;
      }
      #cursor.hovering {
        transform: translate(-50%, -50%) scale(1.6);
        border-color: rgba(255, 220, 150, 1);
      }
      #cursor.dragging {
        transform: translate(-50%, -50%) scale(0.8);
        border-color: rgba(255, 150, 50, 1);
      }

      /* CANVAS LAYERS */
      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #memorial-canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      #particles-canvas {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      /* VIGNETTE */
      #vignette {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        background: radial-gradient(
          ellipse 75% 75% at 50% 50%,
          transparent 30%,
          rgba(0, 0, 0, 0.5) 60%,
          rgba(0, 0, 0, 0.9) 100%
        );
      }

      /* LOADING */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 1.5s ease;
      }
      #loading.hide {
        opacity: 0;
        pointer-events: none;
      }
      #loading-label {
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.5em;
        color: rgba(255, 180, 80, 0.6);
      }
      #loading-track {
        width: 240px;
        height: 2px;
        background: rgba(255, 180, 80, 0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff9040, #ffcc80);
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      /* HEADER */
      #header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 25px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        opacity: 0;
        transition: opacity 2s ease;
      }
      #header.show {
        opacity: 1;
      }

      #logo {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.5em;
        color: rgba(255, 180, 80, 0.4);
      }

      #stele-counter {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: rgba(255, 180, 80, 0.5);
      }

      /* TITRE CENTRAL */
      #memorial-title {
        position: fixed;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 15;
        text-align: center;
        opacity: 0;
        transition: opacity 2.5s ease;
        pointer-events: none;
      }
      #memorial-title.show {
        opacity: 1;
      }
      #memorial-title h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(20px, 3vw, 32px);
        font-weight: 400;
        letter-spacing: 0.35em;
        color: rgba(255, 200, 120, 0.85);
        text-shadow: 0 0 40px rgba(255, 150, 50, 0.3);
        margin-bottom: 8px;
      }
      #memorial-title p {
        font-family: "EB Garamond", serif;
        font-size: 13px;
        font-style: italic;
        color: rgba(255, 200, 120, 0.45);
        letter-spacing: 0.15em;
      }

      /* INSTRUCTIONS */
      #instructions {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 15;
        text-align: center;
        opacity: 0;
        transition: opacity 2s ease;
      }
      #instructions.show {
        opacity: 1;
      }
      #instructions p {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.4em;
        color: rgba(255, 180, 80, 0.35);
        animation: pulse-soft 3s ease-in-out infinite;
      }
      #instructions .hint-360 {
        margin-top: 8px;
        font-size: 9px;
        letter-spacing: 0.3em;
        color: rgba(255, 180, 80, 0.25);
      }
      @keyframes pulse-soft {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 0.7;
        }
      }

      /* PANNEAU STELE */
      #stele-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        width: min(92vw, 700px);
        max-height: 85vh;
        background: rgba(5, 3, 0, 0.96);
        border: 1px solid rgba(255, 180, 80, 0.2);
        border-radius: 3px;
        backdrop-filter: blur(25px);
        box-shadow: 0 0 100px rgba(0, 0, 0, 0.8),
          0 0 60px rgba(255, 100, 30, 0.1);
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.95);
        transition: opacity 0.6s ease, transform 0.6s ease;
        overflow: hidden;
      }
      #stele-panel.show {
        opacity: 1;
        pointer-events: all;
        transform: translate(-50%, -50%) scale(1);
      }

      #panel-header {
        padding: 25px 30px 20px;
        border-bottom: 1px solid rgba(255, 180, 80, 0.12);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      #panel-title-zone h2 {
        font-family: "Cinzel", serif;
        font-size: clamp(18px, 2.5vw, 26px);
        font-weight: 600;
        letter-spacing: 0.15em;
        margin-bottom: 6px;
      }
      #panel-title-zone .subtitle {
        font-family: "EB Garamond", serif;
        font-size: 13px;
        color: rgba(255, 200, 120, 0.6);
        font-style: italic;
      }

      #close-panel {
        background: none;
        border: 1px solid rgba(255, 180, 80, 0.3);
        color: rgba(255, 180, 80, 0.7);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #close-panel:hover {
        background: rgba(255, 180, 80, 0.1);
        border-color: rgba(255, 180, 80, 0.6);
      }

      #panel-content {
        padding: 20px 30px 25px;
        max-height: calc(85vh - 100px);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 180, 80, 0.3) transparent;
      }
      #panel-content::-webkit-scrollbar {
        width: 6px;
      }
      #panel-content::-webkit-scrollbar-track {
        background: transparent;
      }
      #panel-content::-webkit-scrollbar-thumb {
        background: rgba(255, 180, 80, 0.3);
        border-radius: 3px;
      }

      /* Fiche technique */
      .info-block {
        background: rgba(255, 180, 80, 0.04);
        border: 1px solid rgba(255, 180, 80, 0.1);
        border-radius: 2px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .info-block h3 {
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: rgba(255, 200, 120, 0.7);
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255, 180, 80, 0.1);
      }
      .info-block p {
        font-family: "EB Garamond", serif;
        font-size: 15px;
        line-height: 1.8;
        color: rgba(230, 220, 200, 0.85);
        margin-bottom: 12px;
      }
      .info-block p:last-child {
        margin-bottom: 0;
      }
      .info-block strong {
        color: rgba(255, 200, 120, 0.95);
      }
      .info-block .stat {
        display: inline-block;
        background: rgba(255, 100, 50, 0.15);
        padding: 3px 10px;
        border-radius: 2px;
        font-weight: 600;
        color: #ff9966;
      }

      /* Bouton temoignage */
      #audio-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 18px;
        background: linear-gradient(
          135deg,
          rgba(255, 100, 50, 0.15),
          rgba(255, 150, 80, 0.08)
        );
        border: 1px solid rgba(255, 150, 80, 0.35);
        border-radius: 3px;
        color: rgba(255, 200, 150, 0.9);
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.25em;
        cursor: pointer;
        transition: all 0.4s;
        margin-bottom: 20px;
      }
      #audio-btn:hover {
        background: linear-gradient(
          135deg,
          rgba(255, 100, 50, 0.25),
          rgba(255, 150, 80, 0.15)
        );
        border-color: rgba(255, 180, 100, 0.6);
        box-shadow: 0 0 30px rgba(255, 100, 50, 0.2);
      }
      #audio-btn.playing {
        background: linear-gradient(
          135deg,
          rgba(255, 80, 30, 0.3),
          rgba(255, 120, 60, 0.2)
        );
        border-color: rgba(255, 150, 80, 0.7);
      }
      #audio-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      /* Audio waveform animation */
      .audio-wave {
        display: none;
        gap: 3px;
        align-items: center;
        height: 20px;
      }
      .audio-wave.active {
        display: flex;
      }
      .audio-wave span {
        width: 3px;
        height: 8px;
        background: currentColor;
        border-radius: 2px;
        animation: wave 0.8s ease-in-out infinite;
      }
      .audio-wave span:nth-child(2) {
        animation-delay: 0.1s;
      }
      .audio-wave span:nth-child(3) {
        animation-delay: 0.2s;
      }
      .audio-wave span:nth-child(4) {
        animation-delay: 0.3s;
      }
      @keyframes wave {
        0%,
        100% {
          transform: scaleY(0.5);
        }
        50% {
          transform: scaleY(1.5);
        }
      }

      /* Temoignage texte */
      #testimony-text {
        background: rgba(30, 20, 10, 0.5);
        border-left: 3px solid rgba(255, 150, 80, 0.4);
        padding: 20px 25px;
        margin-bottom: 20px;
        max-height: 200px;
        overflow-y: auto;
      }
      #testimony-text p {
        font-family: "EB Garamond", serif;
        font-size: 15px;
        line-height: 2;
        color: rgba(220, 200, 180, 0.9);
        font-style: italic;
      }

      /* Message Gaia */
      #gaia-message {
        background: linear-gradient(
          135deg,
          rgba(0, 80, 60, 0.2),
          rgba(0, 100, 80, 0.1)
        );
        border: 1px solid rgba(0, 200, 150, 0.2);
        border-radius: 3px;
        padding: 20px;
      }
      #gaia-message .speaker {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.4em;
        color: rgba(0, 255, 180, 0.5);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #gaia-message .speaker-btn {
        background: none;
        border: 1px solid rgba(0, 200, 150, 0.4);
        color: rgba(0, 255, 180, 0.7);
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 9px;
        letter-spacing: 0.2em;
        cursor: pointer;
        transition: all 0.3s;
      }
      #gaia-message .speaker-btn:hover {
        background: rgba(0, 200, 150, 0.15);
        border-color: rgba(0, 200, 150, 0.7);
      }
      #gaia-message .speaker-btn.playing {
        background: rgba(0, 200, 150, 0.2);
        border-color: rgba(0, 255, 180, 0.8);
      }
      #gaia-message p {
        font-family: "EB Garamond", serif;
        font-size: 15px;
        line-height: 1.9;
        color: rgba(180, 255, 220, 0.85);
      }

      /* FLAMME CENTRALE (CSS) */
      #flame-indicator {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        text-align: center;
        opacity: 0;
        transition: opacity 2s ease;
      }
      #flame-indicator.show {
        opacity: 1;
      }
      #flame-indicator .flame-icon {
        font-size: 32px;
        animation: flame-dance 1.5s ease-in-out infinite;
      }
      @keyframes flame-dance {
        0%,
        100% {
          transform: scale(1) translateY(0);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.1) translateY(-3px);
          filter: brightness(1.3);
        }
      }
      #flame-indicator.complete .flame-icon {
        color: #4af;
        animation: flame-complete 2s ease-in-out infinite;
      }
      @keyframes flame-complete {
        0%,
        100% {
          transform: scale(1);
          filter: brightness(1) hue-rotate(0deg);
        }
        50% {
          transform: scale(1.15);
          filter: brightness(1.4) hue-rotate(20deg);
        }
      }

      /* BOUTON SORTIE */
      #exit-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 20;
        padding: 14px 28px;
        background: transparent;
        border: 1px solid rgba(0, 200, 150, 0.3);
        color: rgba(0, 200, 150, 0.7);
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.25em;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: all 0.5s;
      }
      #exit-btn.show {
        opacity: 1;
        pointer-events: all;
      }
      #exit-btn:hover {
        background: rgba(0, 200, 150, 0.1);
        border-color: rgba(0, 200, 150, 0.6);
        box-shadow: 0 0 25px rgba(0, 200, 150, 0.2);
      }

      /* AUDIO CONTROL */
      #audio-hint {
        position: fixed;
        bottom: 25px;
        left: 25px;
        z-index: 30;
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.25em;
        color: rgba(255, 180, 80, 0.3);
        cursor: pointer;
        transition: color 0.3s;
      }
      #audio-hint:hover {
        color: rgba(255, 180, 80, 0.7);
      }

      /* CONTROLES 360 */
      #controls-hint {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.2em;
        color: rgba(255, 180, 80, 0.25);
        text-align: center;
        opacity: 0;
        transition: opacity 1s ease;
      }
      #controls-hint.show {
        opacity: 1;
      }

      /* RIDEAU */
      #curtain {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: #000;
        opacity: 1;
        transition: opacity 2s ease;
      }
      #curtain.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* MESSAGE FINAL */
      #final-message {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.5s ease;
      }
      #final-message.show {
        opacity: 1;
        pointer-events: all;
      }
      #final-message .gaia-final {
        font-family: "EB Garamond", serif;
        font-size: clamp(16px, 2.5vw, 22px);
        line-height: 2;
        color: rgba(0, 255, 180, 0.85);
        text-align: center;
        max-width: 700px;
        margin-bottom: 40px;
        white-space: pre-line;
      }
      #final-message .continue-btn {
        padding: 16px 40px;
        background: transparent;
        border: 1px solid rgba(0, 200, 150, 0.4);
        color: rgba(0, 200, 150, 0.8);
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.3em;
        cursor: pointer;
        transition: all 0.4s;
      }
      #final-message .continue-btn:hover {
        background: rgba(0, 200, 150, 0.1);
        border-color: rgba(0, 200, 150, 0.7);
      }
    </style>
  </head>
  <body>
    <!-- Rideau -->
    <div id="curtain"></div>

    <!-- Loading -->
    <div id="loading">
      <div id="loading-label">ENTREE DANS LE MEMORIAL...</div>
      <div id="loading-track"><div id="loading-fill"></div></div>
    </div>

    <!-- Curseur -->
    <div id="cursor"></div>

    <!-- Canvas -->
    <canvas id="bg-canvas"></canvas>
    <canvas id="memorial-canvas"></canvas>
    <canvas id="particles-canvas"></canvas>

    <!-- Vignette -->
    <div id="vignette"></div>

    <!-- Header -->
    <div id="header">
      <div id="logo">G A I A - M E M O R I A L</div>
      <div id="stele-counter">
        STELES VISITEES : <span id="visited-count">0</span> / 5
      </div>
    </div>

    <!-- Titre -->
    <div id="memorial-title">
      <h1>LIEU DE MEMOIRE</h1>
      <p>Pour que l'oubli ne soit jamais complice</p>
    </div>

    <!-- Instructions -->
    <div id="instructions">
      <p>- CLIQUEZ SUR UNE STELE POUR DECOUVRIR SON HISTOIRE -</p>
      <p class="hint-360">GLISSEZ POUR TOURNER LA VUE 360</p>
    </div>

    <!-- Controles hint -->
    <div id="controls-hint"></div>

    <!-- Flamme -->
    <div id="flame-indicator">
      <div class="flame-icon">&#128293;</div>
    </div>

    <!-- Panneau Stele -->
    <div id="stele-panel">
      <div id="panel-header">
        <div id="panel-title-zone">
          <h2 id="panel-title">BHOPAL</h2>
          <div class="subtitle" id="panel-subtitle">
            2-3 Decembre 1984, Inde
          </div>
        </div>
        <button id="close-panel" onclick="closePanel()">&#10005;</button>
      </div>
      <div id="panel-content">
        <div class="info-block" id="info-block">
          <!-- Contenu dynamique -->
        </div>
        <button id="audio-btn" onclick="toggleTestimony()">
          <svg id="play-icon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg id="pause-icon" viewBox="0 0 24 24" style="display: none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
          <div class="audio-wave" id="audio-wave">
            <span></span><span></span><span></span><span></span>
          </div>
          <span id="audio-btn-text">ECOUTER LE TEMOIGNAGE</span>
        </button>
        <div id="testimony-text" style="display: none">
          <p id="testimony-content"></p>
        </div>
        <div id="gaia-message">
          <div class="speaker">
            G A I A
            <button
              class="speaker-btn"
              id="gaia-speak-btn"
              onclick="playGaiaVoice()"
            >
              ECOUTER
            </button>
          </div>
          <p id="gaia-text"></p>
        </div>
      </div>
    </div>

    <!-- Message Final -->
    <div id="final-message">
      <p class="gaia-final" id="final-text"></p>
      <button class="continue-btn" onclick="goToNextScene()">
        CONTINUER LE VOYAGE
      </button>
    </div>

    <!-- Bouton sortie -->
    <button id="exit-btn" onclick="goToNextScene()">QUITTER LE MEMORIAL</button>

    <!-- Audio -->
    <div id="audio-hint" onclick="toggleMute()">SON ACTIVE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      /* ====================================================
       GAIA - SCENE 23 : MEMORIAL DES CATASTROPHES
       Lieu sacre de memoire (style Yad Vashem)
       5 steles monumentales en cercle
       Flamme eternelle centrale
       VUE 360 DEGRES COMPLETE
    ==================================================== */

      // ====================================================
      // DONNEES DES CATASTROPHES
      // ====================================================
      const catastrophes = [
        {
          id: "bhopal",
          name: "BHOPAL",
          icon: "&#127981;",
          date: "2-3 Decembre 1984",
          location: "Madhya Pradesh, Inde",
          color: "#ff6b35",
          deaths: "15,000-20,000 MORTS",
          impact: "500,000 BLESSES",
          quote: "La pire catastrophe industrielle de l'histoire",
          info: `<p><strong>L'Evenement :</strong> Nuit du 2 au 3 decembre 1984, 00h56. Fuite de <span class="stat">40 TONNES</span> d'isocyanate de methyle (MIC) a l'usine Union Carbide.</p>
        <p><strong>Cause :</strong> Negligence criminelle - systeme de securite desactive, refrigeration arretee, personnel reduit, formation insuffisante.</p>
        <p><strong>Bilan :</strong> 3,800 morts la nuit meme, +8,000 la semaine suivante, +8,000 des suites de maladies chroniques.</p>
        <p><strong>Sequelles :</strong> 200,000 personnes avec sequelles permanentes - cecite, insuffisance respiratoire, cancers, malformations congenitales.</p>
        <p><strong>Injustice :</strong> Union Carbide a paye <span class="stat">470M$</span> soit 1,200$ par victime. Aucun dirigeant emprisonne. Site jamais nettoye, nappes phreatiques contaminees en 2026.</p>`,

          const plaqueGeo = new THREE.PlaneGeometry(0.6, 0.4);
          const plaqueMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(cat.color).multiplyScalar(0.6),
            roughness: 0.7,
            emissive: new THREE.Color(cat.color),
            emissiveIntensity: 0.2,
          });
          const plaque = new THREE.Mesh(plaqueGeo, plaqueMat);
          plaque.position.set(x, 1.8, z);
          plaque.lookAt(0, 1.8, 0);
          plaque.translateZ(0.16);
          scene.add(plaque);

          // Base stele
          const baseGeo = new THREE.BoxGeometry(1.0, 0.15, 0.5);
          const baseMat = new THREE.MeshStandardMaterial({
            color: 0x151210,
            roughness: 0.9,
          });
          const base = new THREE.Mesh(baseGeo, baseMat);
          base.position.set(x, 0.075, z);
          base.lookAt(0, 0.075, 0);
          scene.add(base);

          // Lumiere individuelle par stele
          const steleLight = new THREE.PointLight(
            new THREE.Color(cat.color),
            0.3,
            3
          );
          steleLight.position.set(x, 2, z);
          scene.add(steleLight);
        });

        // LUMIERES
        const ambientLight = new THREE.AmbientLight(0x221810, 0.4);
        scene.add(ambientLight);

        const moonLight = new THREE.DirectionalLight(0x8899aa, 0.3);
        moonLight.position.set(5, 10, 5);
        scene.add(moonLight);

        // Resize handler
        window.addEventListener("resize", () => {
          camera.aspect = innerWidth / innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(innerWidth, innerHeight);

          // Resize canvases
          document.getElementById("bg-canvas").width = innerWidth;
          document.getElementById("bg-canvas").height = innerHeight;
          document.getElementById("particles-canvas").width = innerWidth;
          document.getElementById("particles-canvas").height = innerHeight;
          initBackground();
        });

        // CONTROLES 360 DEGRES
        const canvas = document.getElementById("memorial-canvas");

        // Mouse events pour 360
        canvas.addEventListener("mousedown", onMouseDown);
        canvas.addEventListener("mousemove", onMouseMove);
        canvas.addEventListener("mouseup", onMouseUp);
        canvas.addEventListener("mouseleave", onMouseUp);
        canvas.addEventListener("click", onMouseClick);
        canvas.addEventListener("wheel", onMouseWheel);

        // Touch events pour mobile
        canvas.addEventListener("touchstart", onTouchStart, { passive: false });
        canvas.addEventListener("touchmove", onTouchMove, { passive: false });
        canvas.addEventListener("touchend", onTouchEnd);

        animate();
      }

      function updateCameraPosition() {
        // Clamp vertical angle
        targetAngleV = Math.max(0.1, Math.min(1.2, targetAngleV));

        // Smooth interpolation
        cameraAngleH += (targetAngleH - cameraAngleH) * 0.08;
        cameraAngleV += (targetAngleV - cameraAngleV) * 0.08;

        const x =
          Math.sin(cameraAngleH) * Math.cos(cameraAngleV) * cameraDistance;
        const y = Math.sin(cameraAngleV) * cameraDistance * 0.5 + 2;
        const z =
          Math.cos(cameraAngleH) * Math.cos(cameraAngleV) * cameraDistance;

        camera.position.set(x, y, z);
        camera.lookAt(0, 1, 0);
      }

      // MOUSE CONTROLS 360
      function onMouseDown(event) {
        if (document.getElementById("stele-panel").classList.contains("show"))
          return;
        isDragging = true;
        previousMousePosition = { x: event.clientX, y: event.clientY };
        cur.classList.add("dragging");
      }

      function onMouseMove(event) {
        mouse.x = (event.clientX / innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / innerHeight) * 2 + 1;

        if (isDragging) {
          const deltaX = event.clientX - previousMousePosition.x;
          const deltaY = event.clientY - previousMousePosition.y;

          targetAngleH -= deltaX * 0.005;
          targetAngleV += deltaY * 0.003;

          previousMousePosition = { x: event.clientX, y: event.clientY };
        } else {
          // Hover detection
          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObjects(steleObjects);

          if (intersects.length > 0) {
            cur.classList.add("hovering");
          } else {
            cur.classList.remove("hovering");
          }
        }
      }

      function onMouseUp() {
        isDragging = false;
        cur.classList.remove("dragging");
      }

      function onMouseWheel(event) {
        cameraDistance += event.deltaY * 0.01;
        cameraDistance = Math.max(5, Math.min(15, cameraDistance));
      }

      // TOUCH CONTROLS 360
      let touchStartPos = { x: 0, y: 0 };

      function onTouchStart(event) {
        if (document.getElementById("stele-panel").classList.contains("show"))
          return;
        if (event.touches.length === 1) {
          event.preventDefault();
          isDragging = true;
          touchStartPos = {
            x: event.touches[0].clientX,
            y: event.touches[0].clientY,
          };
        }
      }

      function onTouchMove(event) {
        if (isDragging && event.touches.length === 1) {
          event.preventDefault();
          const deltaX = event.touches[0].clientX - touchStartPos.x;
          const deltaY = event.touches[0].clientY - touchStartPos.y;

          targetAngleH -= deltaX * 0.008;
          targetAngleV += deltaY * 0.005;

          touchStartPos = {
            x: event.touches[0].clientX,
            y: event.touches[0].clientY,
          };
        }
      }

      function onTouchEnd() {
        isDragging = false;
      }

      function onMouseClick(event) {
        if (isDragging) return;

        mouse.x = (event.clientX / innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(steleObjects);

        if (intersects.length > 0) {
          const stele = intersects[0].object;
          const catId = stele.userData.catastropheId;
          openStelePanel(catId);
          playSteleActivation();

          // Highlight stele
          stele.material.emissiveIntensity = 0.4;
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Update camera position (360 rotation)
        updateCameraPosition();

        // Animate flame
        if (flameObject) {
          flameObject.material.uniforms.uTime.value = t;
          flameObject.scale.y = 1 + Math.sin(t * 3) * 0.1;
        }

        // Animate flame light
        if (window._flameLight) {
          window._flameLight.intensity = 1.5 + Math.sin(t * 5) * 0.3;

          // Couleur bleue si toutes les steles sont visitees
          if (visitedSteles.size >= 5) {
            window._flameLight.color.setHex(0x4488ff);
            if (flameObject) {
              flameObject.material.uniforms.uColor1.value.setHex(0x2266ff);
              flameObject.material.uniforms.uColor2.value.setHex(0x88ccff);
            }
          }
        }

        // Subtle stele glow animation
        steleObjects.forEach((stele, i) => {
          const pulse = Math.sin(t * 2 + i) * 0.02;
          if (!visitedSteles.has(stele.userData.catastropheId)) {
            stele.material.emissiveIntensity =
              stele.userData.originalEmissive + pulse;
          }
        });

        renderer.render(scene, camera);
      }

      // ====================================================
      // PANNEAU STELE
      // ====================================================
      function openStelePanel(catId) {
        const cat = catastrophes.find((c) => c.id === catId);
        if (!cat) return;

        currentStele = cat;

        // Stop any ongoing speech
        stopSpeaking();
        isTestimonyPlaying = false;
        isGaiaPlaying = false;
        updateAudioButton();
        document.getElementById("gaia-speak-btn").classList.remove("playing");
        document.getElementById("gaia-speak-btn").textContent = "ECOUTER";

        // Update panel content
        document.getElementById(
          "panel-title"
        ).innerHTML = `${cat.icon} ${cat.name}`;
        document.getElementById("panel-title").style.color = cat.color;
        document.getElementById(
          "panel-subtitle"
        ).textContent = `${cat.date} - ${cat.location}`;

        document.getElementById("info-block").innerHTML = `
        <h3>FICHE TECHNIQUE</h3>
        <p><strong>Bilan :</strong> <span class="stat">${cat.deaths}</span> - ${cat.impact}</p>
        <p><em>"${cat.quote}"</em></p>
        ${cat.info}
      `;

        document.getElementById("testimony-content").textContent =
          cat.testimony;
        document.getElementById("testimony-text").style.display = "none";

        document.getElementById("gaia-text").textContent = cat.gaia;

        // Mark as visited
        if (!visitedSteles.has(catId)) {
          visitedSteles.add(catId);
          updateCounter();

          // Mark stele visually
          const stele = steleObjects.find(
            (s) => s.userData.catastropheId === catId
          );
          if (stele) {
            stele.material.emissiveIntensity = 0.3;
            stele.userData.originalEmissive = 0.3;
          }

          checkCompletion();
        }

        // Show panel
        document.getElementById("stele-panel").classList.add("show");
      }

      function closePanel() {
        document.getElementById("stele-panel").classList.remove("show");
        stopSpeaking();
        isTestimonyPlaying = false;
        isGaiaPlaying = false;
        currentStele = null;
      }

      function updateAudioButton() {
        const playIcon = document.getElementById("play-icon");
        const pauseIcon = document.getElementById("pause-icon");
        const audioWave = document.getElementById("audio-wave");
        const btnText = document.getElementById("audio-btn-text");
        const btn = document.getElementById("audio-btn");
        const textDiv = document.getElementById("testimony-text");

        if (isTestimonyPlaying) {
          playIcon.style.display = "none";
          pauseIcon.style.display = "block";
          audioWave.classList.add("active");
          btnText.textContent = "ARRETER LE TEMOIGNAGE";
          btn.classList.add("playing");
          textDiv.style.display = "block";
        } else {
          playIcon.style.display = "block";
          pauseIcon.style.display = "none";
          audioWave.classList.remove("active");
          btnText.textContent = "ECOUTER LE TEMOIGNAGE";
          btn.classList.remove("playing");
        }
      }

      function toggleTestimony() {
        if (!currentStele) return;

        isTestimonyPlaying = !isTestimonyPlaying;
        updateAudioButton();

        if (isTestimonyPlaying) {
          // Stop Gaia if playing
          if (isGaiaPlaying) {
            isGaiaPlaying = false;
            document
              .getElementById("gaia-speak-btn")
              .classList.remove("playing");
            document.getElementById("gaia-speak-btn").textContent = "ECOUTER";
          }

          // Play testimony audio
          speakText(
            currentStele.testimony,
            currentStele.voicePitch || 1,
            currentStele.voiceRate || 0.9,
            () => {
              isTestimonyPlaying = false;
              updateAudioButton();
            }
          );

          // Play audio effect
          if (audioCtx && !isMuted) {
            [200, 250, 300].forEach((freq, i) => {
              setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(
                  0.001,
                  audioCtx.currentTime + 0.3
                );
                osc.connect(gain);
                gain.connect(getMaster());
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
              }, i * 100);
            });
          }
        } else {
          stopSpeaking();
        }
      }

      function playGaiaVoice() {
        if (!currentStele) return;

        const btn = document.getElementById("gaia-speak-btn");

        isGaiaPlaying = !isGaiaPlaying;

        if (isGaiaPlaying) {
          // Stop testimony if playing
          if (isTestimonyPlaying) {
            isTestimonyPlaying = false;
            updateAudioButton();
          }

          btn.classList.add("playing");
          btn.textContent = "ARRETER";

          // Gaia voice - more ethereal
          speakText(
            currentStele.gaia,
            0.6, // Lower pitch for Gaia
            0.75, // Slower rate
            () => {
              isGaiaPlaying = false;
              btn.classList.remove("playing");
              btn.textContent = "ECOUTER";
            }
          );

          // Ethereal sound effect for Gaia
          if (audioCtx && !isMuted) {
            [150, 225, 300, 375].forEach((freq, i) => {
              setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(
                  0.001,
                  audioCtx.currentTime + 0.8
                );
                osc.connect(gain);
                gain.connect(getMaster());
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
              }, i * 150);
            });
          }
        } else {
          stopSpeaking();
          btn.classList.remove("playing");
          btn.textContent = "ECOUTER";
        }
      }

      function updateCounter() {
        document.getElementById("visited-count").textContent =
          visitedSteles.size;
      }

      function checkCompletion() {
        if (visitedSteles.size >= 5) {
          // Flamme devient bleue
          document.getElementById("flame-indicator").classList.add("complete");

          // Show exit button
          document.getElementById("exit-btn").classList.add("show");

          // Afficher message final apres delai
          setTimeout(() => {
            showFinalMessage();
          }, 2000);
        }
      }

      function showFinalMessage() {
        const finalText = `Ne detournez pas le regard.

Leurs noms sont graves dans la pierre.
Leurs voix sont gravees en vous.

Bhopal. Tchernobyl. Exxon Valdez. La Mer d'Aral. La Grande Barriere de Corail.

Ce ne sont pas que des catastrophes.
Ce sont des avertissements.
Des cris que l'humanite a choisi d'ignorer.

Passons maintenant a la carte de vos blessures...
Pour comprendre l'etendue du mal.`;

        document.getElementById("final-text").textContent = finalText;
        document.getElementById("final-message").classList.add("show");

        // Speak final Gaia message
        if (!isMuted) {
          setTimeout(() => {
            speakText(finalText, 0.5, 0.7);
          }, 1500);
        }
      }

      // ====================================================
      // NAVIGATION
      // ====================================================
      function goToNextScene() {
        const curtain = document.getElementById("curtain");
        curtain.classList.remove("hide");

        stopSpeaking();

        if (audioCtx && window._master) {
          const gain = audioCtx.createGain();
          window._master.disconnect();
          window._master.connect(gain);
          gain.connect(audioCtx.destination);
          gain.gain.setValueAtTime(1, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
        }

        setTimeout(() => {
          window.location.href = "scene24.html";
        }, 2000);
      }

      // ====================================================
      // LOADING & INIT
      // ====================================================
      function simulateLoading() {
        let progress = 0;
        const fill = document.getElementById("loading-fill");

        const interval = setInterval(() => {
          progress += Math.random() * 15 + 5;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);

            setTimeout(() => {
              document.getElementById("loading").classList.add("hide");
              startMemorial();
            }, 500);
          }
          fill.style.width = progress + "%";
        }, 200);
      }

      function startMemorial() {
        initAudio();

        // Load voices for speech synthesis
        if (speechSynth) {
          speechSynth.getVoices();
          speechSynth.onvoiceschanged = () => speechSynth.getVoices();
        }

        setTimeout(() => {
          document.getElementById("curtain").classList.add("hide");
        }, 300);

        setTimeout(() => {
          document.getElementById("header").classList.add("show");
          document.getElementById("memorial-title").classList.add("show");
          document.getElementById("flame-indicator").classList.add("show");
        }, 1500);

        setTimeout(() => {
          document.getElementById("instructions").classList.add("show");
          document.getElementById("controls-hint").classList.add("show");
          playAmbience();
          playFlameSound();
        }, 3000);
      }

      // ====================================================
      // INIT
      // ====================================================
      initBackground();
      initParticles();
      initThree();
      simulateLoading();
    </script>
  </body>
</html>
