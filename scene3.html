<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAÏA — Scène 3 : Le Cerveau</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --g: #00ff88;
        --gd: #00cc66;
        --soft: #d0f0e0;
        --ui-bg: rgba(0, 6, 3, 0.88);
        --ui-border: rgba(0, 255, 136, 0.13);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      body {
        font-family: "EB Garamond", Georgia, serif;
        cursor: none;
        opacity: 0;
        animation: page-in 0.5s ease 0.05s forwards;
      }
      @keyframes page-in {
        to {
          opacity: 1;
        }
      }

      #cursor {
        position: fixed;
        width: 16px;
        height: 16px;
        border: 1.5px solid rgba(0, 255, 136, 0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.15s, height 0.15s, border-color 0.15s;
      }
      #cursor::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 3px;
        background: var(--g);
        border-radius: 50%;
      }
      #cursor.big {
        width: 28px;
        height: 28px;
        border-color: var(--g);
        box-shadow: 0 0 14px var(--g);
      }

      /* ── LAYERS ── */
      #tunnel-canvas {
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      #brain-canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: none;
      }
      #vein-canvas {
        position: fixed;
        inset: 0;
        z-index: 400;
        display: none;
      }
      #vignette {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        background: radial-gradient(
          ellipse 78% 78% at 50% 50%,
          transparent 30%,
          rgba(0, 0, 0, 0.22) 60%,
          rgba(0, 0, 0, 0.82) 100%
        );
      }

      /* ── FLASHES ── */
      #flash-layer {
        position: fixed;
        inset: 0;
        z-index: 300;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          ellipse at 50% 50%,
          #00ff88 0%,
          #003322 55%,
          #000 100%
        );
        transition: opacity 0.1s;
      }
      #flash-layer.on {
        opacity: 1;
      }
      #blind-flash {
        position: fixed;
        inset: 0;
        z-index: 450;
        pointer-events: none;
        opacity: 0;
        background: #00ff88;
      }
      #curtain {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: #000;
        opacity: 1;
        pointer-events: none;
        transition: opacity 1.4s ease;
      }
      #curtain.gone {
        opacity: 0;
      }
      #curtain.show {
        opacity: 1;
      }

      /* ── TUNNEL LABEL ── */
      #tunnel-label {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 85px);
        z-index: 110;
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.45em;
        color: rgba(200, 80, 50, 0.85);
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
        text-shadow: 0 0 20px rgba(255, 50, 0, 0.6);
      }
      #tunnel-label.show {
        opacity: 1;
      }
      /* Pulse animation for fear labels */
      #tunnel-label.fear {
        animation: fear-pulse 0.6s ease-in-out infinite alternate;
      }
      @keyframes fear-pulse {
        from {
          opacity: 0.6;
          letter-spacing: 0.4em;
        }
        to {
          opacity: 1;
          letter-spacing: 0.5em;
        }
      }

      /* ══════════════ HUD ══════════════ */
      #hud {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #hud.show {
        opacity: 1;
      }
      #top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px 0;
      }
      #top-logo {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.55em;
        color: rgba(0, 255, 136, 0.22);
      }
      #top-center {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.38em;
        color: rgba(0, 255, 136, 0.15);
      }
      #top-right {
        display: flex;
        gap: 20px;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.25em;
        color: rgba(0, 255, 136, 0.3);
      }

      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
      }
      #crosshair.show {
        opacity: 0.5;
      }
      .ch {
        position: absolute;
        background: rgba(0, 255, 136, 0.6);
      }
      .ch-h {
        width: 14px;
        height: 1px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .ch-v {
        width: 1px;
        height: 14px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .ch-c {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--g);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      /* Health Panel */
      #health-panel {
        position: absolute;
        top: 56px;
        right: 24px;
        width: 256px;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        backdrop-filter: blur(20px);
        border-radius: 3px;
        overflow: hidden;
        pointer-events: all;
        transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 46px;
      }
      #health-panel.open {
        max-height: 280px;
      }
      #hp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 16px;
        cursor: pointer;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.38em;
        color: rgba(0, 255, 136, 0.5);
      }
      #hp-toggle {
        font-size: 9px;
        transition: transform 0.35s;
        color: rgba(0, 255, 136, 0.4);
      }
      #health-panel.open #hp-toggle {
        transform: rotate(180deg);
      }
      #hp-body {
        padding: 12px 16px 14px;
      }
      .hp-row {
        margin-bottom: 10px;
      }
      .hp-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .hp-lbl {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.4);
      }
      .hp-val {
        font-family: "Cinzel", serif;
        font-size: 8px;
      }
      .hp-track {
        height: 2px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 2px;
        overflow: hidden;
      }
      .hp-fill {
        height: 100%;
        border-radius: 2px;
      }
      .c-ok {
        color: var(--g);
      }
      .c-warn {
        color: #ffaa33;
      }
      .c-crit {
        color: #ff4444;
      }

      /* Portal Tooltip */
      #portal-tip {
        position: absolute;
        pointer-events: none;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.3s, transform 0.3s;
        z-index: 30;
      }
      #portal-tip.show {
        opacity: 1;
        transform: translateY(0);
      }
      #pt-inner {
        background: var(--ui-bg);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px);
        border-radius: 3px;
        padding: 18px 22px;
        min-width: 230px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      }
      .pt-icon {
        font-size: 28px;
        display: block;
        margin-bottom: 9px;
      }
      .pt-name {
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.22em;
        margin-bottom: 5px;
      }
      .pt-status {
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.18em;
        opacity: 0.7;
        margin-bottom: 6px;
      }
      .pt-mission {
        font-family: "EB Garamond", serif;
        font-size: 13px;
        line-height: 1.6;
        opacity: 0.65;
        margin-bottom: 8px;
      }
      .pt-access {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.22em;
        padding: 5px 10px;
        border-radius: 2px;
        display: inline-block;
      }
      .pt-access.open {
        color: var(--g);
        border: 1px solid rgba(0, 255, 136, 0.35);
        background: rgba(0, 255, 136, 0.06);
      }
      .pt-access.locked {
        color: rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Portal enter button */
      #portal-enter {
        position: absolute;
        bottom: 156px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
      }
      #portal-enter.show {
        opacity: 1;
        pointer-events: all;
      }
      #portal-enter button {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: var(--g);
        background: rgba(0, 6, 3, 0.9);
        border: 1px solid rgba(0, 255, 136, 0.4);
        padding: 12px 36px;
        cursor: pointer;
        transition: all 0.3s;
        border-radius: 2px;
      }
      #portal-enter button:hover {
        background: rgba(0, 255, 136, 0.08);
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.25);
      }

      /* Voice box */
      #voice-box {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(700px, 90vw);
        padding: 0 0 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
      }
      #vb-sep {
        width: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 136, 0.4),
          transparent
        );
        margin-bottom: 12px;
        transition: width 1s ease;
      }
      #vb-sep.show {
        width: 100%;
      }
      #vb-card {
        width: 100%;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        backdrop-filter: blur(24px);
        border-radius: 3px;
        padding: 18px 26px 16px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.8s, transform 0.8s;
        pointer-events: all;
      }
      #vb-card.show {
        opacity: 1;
        transform: translateY(0);
      }
      #vb-speaker-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      #vb-name {
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.42em;
        color: rgba(0, 255, 136, 0.38);
      }
      #vbars {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #vbars.on {
        opacity: 1;
      }
      .vb {
        width: 2px;
        border-radius: 1px;
        background: var(--gd);
        transform-origin: bottom;
        animation: vba 1s ease-in-out infinite alternate;
      }
      .vb:nth-child(1) {
        height: 3px;
        animation-duration: 0.38s;
      }
      .vb:nth-child(2) {
        height: 10px;
        animation-duration: 0.52s;
        animation-delay: 0.04s;
      }
      .vb:nth-child(3) {
        height: 5px;
        animation-duration: 0.41s;
        animation-delay: 0.09s;
      }
      .vb:nth-child(4) {
        height: 12px;
        animation-duration: 0.58s;
        animation-delay: 0.07s;
      }
      .vb:nth-child(5) {
        height: 4px;
        animation-duration: 0.44s;
        animation-delay: 0.11s;
      }
      .vb:nth-child(6) {
        height: 8px;
        animation-duration: 0.49s;
        animation-delay: 0.03s;
      }
      @keyframes vba {
        from {
          transform: scaleY(0.18);
          opacity: 0.5;
        }
        to {
          transform: scaleY(1);
          opacity: 1;
        }
      }
      #vb-text {
        font-family: "EB Garamond", serif;
        font-size: clamp(13px, 1.65vw, 16px);
        line-height: 2;
        color: var(--soft);
        white-space: pre-wrap;
        max-height: 140px;
        overflow-y: auto;
        scrollbar-width: none;
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.8);
      }
      #vb-text::-webkit-scrollbar {
        display: none;
      }
      #tw-cur {
        display: inline-block;
        width: 2px;
        height: 14px;
        background: var(--g);
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Bottom left */
      #bottom-left {
        position: absolute;
        bottom: 24px;
        left: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .bl-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .bl-lbl {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.28em;
        color: rgba(0, 255, 136, 0.3);
      }
      .bl-val {
        font-family: "Cinzel", serif;
        font-size: 17px;
        letter-spacing: 0.12em;
        color: var(--g);
      }

      /* Minimap */
      #minimap-wrap {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 118px;
        height: 118px;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid rgba(0, 255, 136, 0.18);
        background: rgba(0, 6, 3, 0.85);
        backdrop-filter: blur(12px);
      }
      #minimap-canvas {
        display: block;
      }

      /* Move hint */
      #move-hint {
        position: absolute;
        bottom: 156px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.3em;
        color: rgba(0, 255, 136, 0.28);
        white-space: nowrap;
        pointer-events: none;
        animation: hint-fade 3s ease 4s forwards;
      }
      @keyframes hint-fade {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      /* BOOM text overlay */
      #boom-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 420;
        font-family: "Cinzel", serif;
        font-size: clamp(60px, 12vw, 140px);
        font-weight: 900;
        color: #ff2200;
        letter-spacing: 0.1em;
        opacity: 0;
        pointer-events: none;
        text-shadow: 0 0 60px rgba(255, 30, 0, 0.8),
          0 0 120px rgba(255, 0, 0, 0.4);
      }

      #audio-btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.3em;
        color: rgba(0, 255, 136, 0.2);
        cursor: pointer;
        transition: color 0.3s;
        pointer-events: all;
      }
      #audio-btn:hover {
        color: rgba(0, 255, 136, 0.65);
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <canvas id="tunnel-canvas"></canvas>
    <canvas id="brain-canvas"></canvas>
    <canvas id="vein-canvas"></canvas>
    <div id="vignette"></div>
    <div id="flash-layer"></div>
    <div id="blind-flash"></div>
    <div id="tunnel-label"></div>
    <div id="boom-text">BOOM</div>

    <div id="hud">
      <div id="top-bar">
        <div id="top-logo">G A Ï A</div>
        <div id="top-center">C E R V E A U — H U B C E N T R A L</div>
        <div id="top-right">
          <span id="score-val">SCORE : 0</span><span id="timer-val">00:00</span>
        </div>
      </div>
      <div id="crosshair">
        <div class="ch ch-h"></div>
        <div class="ch ch-v"></div>
        <div class="ch ch-c"></div>
      </div>
      <div id="health-panel" onclick="toggleHealth()">
        <div id="hp-header">
          ÉTAT DE SANTÉ DE GAÏA <span id="hp-toggle">▼</span>
        </div>
        <div id="hp-body">
          <div class="hp-row">
            <div class="hp-top">
              <span class="hp-lbl">SANTÉ GLOBALE</span
              ><span class="hp-val c-warn">67/100</span>
            </div>
            <div class="hp-track">
              <div
                class="hp-fill"
                style="
                  width: 67%;
                  background: linear-gradient(90deg, #ff4444, #ffaa33, #00ff88);
                "
              ></div>
            </div>
          </div>
          <div class="hp-row">
            <div class="hp-top">
              <span class="hp-lbl">TEMPÉRATURE</span
              ><span class="hp-val c-warn">+1.2°C ⚠</span>
            </div>
            <div class="hp-track">
              <div
                class="hp-fill"
                style="width: 62%; background: #ffaa33"
              ></div>
            </div>
          </div>
          <div class="hp-row">
            <div class="hp-top">
              <span class="hp-lbl">BIODIVERSITÉ</span
              ><span class="hp-val c-crit">−30% 🔴</span>
            </div>
            <div class="hp-track">
              <div
                class="hp-fill"
                style="width: 35%; background: #ff4444"
              ></div>
            </div>
          </div>
          <div class="hp-row">
            <div class="hp-top">
              <span class="hp-lbl">POLLUTION</span
              ><span class="hp-val c-warn">ÉLEVÉE ⚠</span>
            </div>
            <div class="hp-track">
              <div
                class="hp-fill"
                style="width: 78%; background: #ffaa33"
              ></div>
            </div>
          </div>
          <div class="hp-row">
            <div class="hp-top">
              <span class="hp-lbl">ÉNERGIES VERTES</span
              ><span class="hp-val" style="color: #ffcc00">38% 🟡</span>
            </div>
            <div class="hp-track">
              <div
                class="hp-fill"
                style="width: 38%; background: #ffcc00"
              ></div>
            </div>
          </div>
        </div>
      </div>
      <div id="portal-tip">
        <div id="pt-inner">
          <span class="pt-icon" id="pt-icon"></span>
          <div class="pt-name" id="pt-name"></div>
          <div class="pt-status" id="pt-status"></div>
          <div class="pt-mission" id="pt-mission"></div>
          <span class="pt-access" id="pt-access"></span>
        </div>
      </div>
      <div id="portal-enter">
        <button onclick="enterPortal()">▶ &nbsp;ENTRER DANS CE PORTAIL</button>
      </div>
      <div id="voice-box">
        <div id="vb-sep"></div>
        <div id="vb-card">
          <div id="vb-speaker-row">
            <span id="vb-name">G A Ï A</span
            ><span id="vbars"
              ><span class="vb"></span><span class="vb"></span
              ><span class="vb"></span><span class="vb"></span
              ><span class="vb"></span><span class="vb"></span
            ></span>
          </div>
          <div id="vb-text"></div>
          <span id="tw-cur"></span>
        </div>
      </div>
      <div id="bottom-left">
        <div class="bl-item">
          <span class="bl-lbl">SCORE</span
          ><span class="bl-val" id="score-display">0</span>
        </div>
        <div class="bl-item">
          <span class="bl-lbl">TEMPS</span
          ><span class="bl-val" id="timer-display">00:00</span>
        </div>
      </div>
      <div id="minimap-wrap">
        <canvas id="minimap-canvas" width="118" height="118"></canvas>
      </div>
      <div id="move-hint">CLIC · WASD DÉPLACER · SOURIS REGARDER · H SANTÉ</div>
    </div>

    <div id="curtain"></div>
    <div id="audio-btn" onclick="toggleMute()">🔊 SON</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // ══════════════════════════════════════════════════════════════════
      // GAÏA SCÈNE 3 — TUNNEL DE PEUR + CERVEAU + PORTAIL CŒUR + VEINES
      // ══════════════════════════════════════════════════════════════════

      let PHASE = "tunnel";
      let isMuted = false,
        audioCtx = null;
      let score = 0,
        elapsed = 0,
        timerOn = false;
      let nearPortalIdx = -1,
        lastNearIdx = -2;
      let typeIv = null;
      let heartDialoguePlayed = false; // so we only say heart dialogue once
      let enteringPortal = false;

      let playerName = "Gardien";
      try {
        playerName = localStorage.getItem("gaiaPlayerName") || "Gardien";
      } catch (e) {}

      const PORTALS = [
        {
          icon: "💚",
          name: "SYSTÈME CARDIOVASCULAIRE",
          status: "🟡 AFFAIBLI",

      // ══ AUDIO ══
      function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      function getMaster() {
        if (!audioCtx) return null;
        if (!window._gM) {
          const c = audioCtx.createDynamicsCompressor();
          c.threshold.value = -18;
          c.knee.value = 8;
          c.ratio.value = 3;
          c.attack.value = 0.003;
          c.release.value = 0.25;
          c.connect(audioCtx.destination);
          window._gM = c;
        }
        return window._gM;
      }
      function mkReverb(dur = 4, decay = 2.4) {
        if (!audioCtx) return null;
        const sr = audioCtx.sampleRate,
          len = sr * dur;
        const buf = audioCtx.createBuffer(2, len, sr);
        for (let c = 0; c < 2; c++) {
          const d = buf.getChannelData(c);
          for (let i = 0; i < len; i++)
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        const cv = audioCtx.createConvolver();
        cv.buffer = buf;
        return cv;
      }

      // ── TUNNEL AUDIO — atmosphère de peur, crescendo sombre ──
      function playTunnelAudio() {
        if (!audioCtx || isMuted) return;
        const m = getMaster(),
          rv = mkReverb(4, 3);
        rv.connect(m);
        // Low rumble of terror
        [30, 45, 60].forEach((f, i) => {
          const o = audioCtx.createOscillator(),
            g = audioCtx.createGain();
          o.type = "sawtooth";
          o.frequency.setValueAtTime(f, audioCtx.currentTime);
          o.frequency.exponentialRampToValueAtTime(
            f * 3.5,
            audioCtx.currentTime + 5.5
          );
          g.gain.setValueAtTime(0, audioCtx.currentTime);
          g.gain.linearRampToValueAtTime(
            0.03 - i * 0.006,
            audioCtx.currentTime + 0.6
          );
          g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 6);
          const filt = audioCtx.createBiquadFilter();
          filt.type = "lowpass";
          filt.frequency.value = 300 + i * 80;
          o.connect(filt);
          filt.connect(g);
          g.connect(rv);
          g.connect(m);
          o.start();
          o.stop(audioCtx.currentTime + 6);
        });
        // Fear screech (high transient)
        const o2 = audioCtx.createOscillator(),
          g2 = audioCtx.createGain();
        o2.type = "sine";
        o2.frequency.setValueAtTime(800, audioCtx.currentTime + 1);
        o2.frequency.exponentialRampToValueAtTime(
          200,
          audioCtx.currentTime + 2.5
        );
        g2.gain.setValueAtTime(0, audioCtx.currentTime + 1);
        g2.gain.linearRampToValueAtTime(0.025, audioCtx.currentTime + 1.3);
        g2.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.6);
        o2.connect(g2);
        g2.connect(rv);
        o2.start();
        o2.stop(audioCtx.currentTime + 3);
        // Wind of dread
        const nb = audioCtx.createBuffer(
          1,
          audioCtx.sampleRate * 6,
          audioCtx.sampleRate
        );
        const nd = nb.getChannelData(0);
        for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
        const ns = audioCtx.createBufferSource();
        ns.buffer = nb;
        ns.loop = true;
        const nf = audioCtx.createBiquadFilter();
        nf.type = "bandpass";
        nf.frequency.value = 500;
        nf.Q.value = 0.25;
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0, audioCtx.currentTime);
        ng.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + 1.5);
        ng.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 6);
        ns.connect(nf);
        nf.connect(ng);
        ng.connect(m);
        ns.start();
        ns.stop(audioCtx.currentTime + 6);
      }

      // Exact same speakAndType as scene 2 — voice synced with typing
      function speakAndType(text, onDone) {
        const el = document.getElementById("vb-text"),
          cur = document.getElementById("tw-cur");
        el.textContent = "";
        cur.style.display = "inline-block";
        document.getElementById("vb-sep").classList.add("show");
        document.getElementById("vb-card").classList.add("show");
        let displayed = 0,
          target = 0,
          vDone = false;

        function tick() {
          if (typeIv) clearInterval(typeIv);
          typeIv = setInterval(() => {
            if (displayed < target && displayed < text.length) {
              el.textContent += text[displayed++];
              el.scrollTop = el.scrollHeight;
            } else {
              clearInterval(typeIv);
              typeIv = null;
              if (displayed >= text.length) {
                cur.style.display = "none";
                if (vDone && onDone) setTimeout(onDone, 500);
              }
            }
          }, 22);
        }

        if (synth && !isMuted) {
          synth.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = "fr-FR";
          u.rate = 0.72;
          u.pitch = 0.64;
          u.volume = 0.88;
          const sv = () => {
            const v = getGaiaVoice();
            if (v) u.voice = v;
          };
          synth.getVoices().length
            ? sv()
            : synth.addEventListener("voiceschanged", sv, { once: true });
          u.onstart = () =>
            document.getElementById("vbars").classList.add("on");
          u.onboundary = (e) => {
            if (e.name === "word") {
              target = Math.min(e.charIndex + e.charLength, text.length);
              tick();
            }
          };
          u.onend = u.onerror = () => {
            document.getElementById("vbars").classList.remove("on");
            vDone = true;
            target = text.length;
            tick();
          };
          synth.speak(u);
        }
        // Fallback typewriter
        setTimeout(() => {
          if (
            displayed === 0 &&
            !document.getElementById("vbars").classList.contains("on")
          ) {
            if (typeIv) clearInterval(typeIv);
            vDone = true;
            typeIv = setInterval(() => {
              if (displayed < text.length) {
                el.textContent += text[displayed++];
                el.scrollTop = el.scrollHeight;
              } else {
                clearInterval(typeIv);
                cur.style.display = "none";
                if (onDone) setTimeout(onDone, 500);
              }
            }, 26);
          }
        }, 1600);
      }

      function stopVoice() {
        if (synth) synth.cancel();

          clearInterval(typeIv);
          typeIv = null;

        document.getElementById("vbars").classList.remove("on");

      function drawAtmos(cx, cy, t) {
        // Dark purple atmospheric distortion bands
        for (let i = 0; i < 5; i++) {
          const y = cy + Math.sin(t * 0.3 + i * 1.2) * 100 + (i - 2) * 120;
          const gd = TCX.createLinearGradient(0, y - 60, 0, y + 60);
          gd.addColorStop(0, "rgba(60,20,120,0)");
          gd.addColorStop(
            0.5,
            `rgba(80,30,160,${0.055 + Math.sin(t + i) * 0.03})`
          );
          gd.addColorStop(1, "rgba(40,10,80,0)");
          TCX.fillStyle = gd;
          TCX.fillRect(0, y - 60, TC.width, 120);
        }
        // Fear distortion lines
        TCX.save();
        for (let i = 0; i < 6; i++) {
          const y = ((t * 120 + i * 80) % (TC.height + 80)) - 40;
          TCX.beginPath();
          TCX.moveTo(0, y);
          TCX.lineTo(TC.width, y + Math.sin(t + i) * 15);
          TCX.strokeStyle = `rgba(120,50,200,${
            0.04 + Math.sin(t * 2 + i) * 0.02
          })`;
          TCX.lineWidth = 0.8;
          TCX.stroke();
        }
        TCX.restore();
      }
      function drawClouds(cx, cy, t) {
        // Dark ashy clouds
        for (let i = 0; i < 8; i++) {
          const x = (((i / 8 + t * 0.035) % 1.3) - 0.1) * TC.width,
            y = cy + Math.sin(i * 1.5 + t * 0.2) * 120;
          const r = 60 + i * 20;
          const gd = TCX.createRadialGradient(x, y, 0, x, y, r);
          gd.addColorStop(0, `rgba(80,40,20,${0.08 + Math.sin(t + i) * 0.03})`);
          gd.addColorStop(1, "rgba(60,20,10,0)");
          TCX.fillStyle = gd;
          TCX.beginPath();
          TCX.ellipse(x, y, r, r * 0.5, 0, 0, Math.PI * 2);
          TCX.fill();
        }
      }
      function drawRocks(cx, cy, t) {
        TCX.save();
        // Red-hot cracks
        for (let i = 0; i < 10; i++) {
          const ang = (i / 10) * Math.PI * 2 + t * 0.04;
          TCX.beginPath();
          let x = cx,
            y = cy;
          for (let s = 0; s < 6; s++) {
            x += Math.cos(ang + Math.sin(s * 0.9) * 0.5) * (65 + s * 40);
            y += Math.sin(ang + Math.sin(s * 0.9) * 0.5) * (65 + s * 40);
            s === 0 ? TCX.moveTo(x, y) : TCX.lineTo(x, y);
          }
          TCX.strokeStyle = `rgba(220,60,10,${0.18 + Math.sin(t + i) * 0.09})`;
          TCX.lineWidth = 2.2 - i * 0.12;
          TCX.stroke();
        }
        // Pulsing magma spots — fear
        for (let i = 0; i < 7; i++) {
          const ang = (i / 7) * Math.PI * 2 + t * 0.08;
          const dist = 160 + Math.sin(t * 1.6 + i) * 80;
          const x = cx + Math.cos(ang) * dist,
            y = cy + Math.sin(ang) * dist;
          const gd = TCX.createRadialGradient(x, y, 0, x, y, 60);
          gd.addColorStop(
            0,
            `rgba(255,${40 + Math.floor(Math.sin(t * 3 + i) * 20)},0,${
              0.25 + Math.sin(t * 2 + i) * 0.12
            })`
          );
          gd.addColorStop(1, "rgba(200,0,0,0)");
          TCX.fillStyle = gd;
          TCX.beginPath();
          TCX.arc(x, y, 62, 0, Math.PI * 2);
          TCX.fill();
        }
        TCX.restore();
      }
      function drawRoots(cx, cy, t) {
        TCX.save();
        for (let i = 0; i < 14; i++) {
          const ang = (i / 14) * Math.PI * 2 + t * 0.05;
          TCX.beginPath();
          let x = cx,
            y = cy;
          for (let s = 0; s < 8; s++) {
            const b = Math.sin(t * 0.4 + i * 0.7 + s * 0.45) * 0.55;
            x += Math.cos(ang + b) * (55 + s * 28);
            y += Math.sin(ang + b) * (55 + s * 28);
            s === 0 ? TCX.moveTo(x, y) : TCX.lineTo(x, y);
          }
          const al = 0.1 + Math.sin(t * 1.2 + i) * 0.06;
          TCX.strokeStyle = `rgba(0,${
            140 + Math.floor(Math.sin(t + i) * 40)
          },40,${al})`;
          TCX.lineWidth = 3.2 - i * 0.16;
          TCX.stroke();
          if (i % 3 === 0) {
            const ba = ang + 0.9;
            TCX.beginPath();
            TCX.moveTo(x, y);
            TCX.lineTo(x + Math.cos(ba) * 100, y + Math.sin(ba) * 100);
            TCX.strokeStyle = `rgba(0,160,40,${al * 0.5})`;
            TCX.lineWidth = 1.3;
            TCX.stroke();
          }
        }
        TCX.restore();
      }
      function drawCells(cx, cy, t) {
        TCX.save();
        for (let i = 0; i < 18; i++) {
          const ang = (i / 18) * Math.PI * 2 + t * 0.11;
          const dist = 65 + Math.sin(t * 1.4 + i) * 55;
          const x = cx + Math.cos(ang) * dist,
            y = cy + Math.sin(ang) * dist;
          const r = 15 + Math.sin(t * 2 + i) * 7;
          TCX.strokeStyle = `rgba(0,255,136,${0.14 + Math.sin(t + i) * 0.07})`;
          TCX.lineWidth = 1.5;
          TCX.beginPath();
          TCX.arc(x, y, r, 0, Math.PI * 2);
          TCX.stroke();
          TCX.beginPath();
          TCX.arc(x, y, r * 0.32, 0, Math.PI * 2);
          TCX.fillStyle = `rgba(0,255,136,${
            0.065 + Math.sin(t * 3 + i) * 0.04
          })`;
          TCX.fill();
        }
        TCX.restore();
      }

      function tunnelFrame() {
        const W = TC.width,
          H = TC.height;
        tT += 0.018;
        tFrame++;
        tLFrame++;

        if (tLFrame > T_LF && tLayer < LAYERS.length - 1) {
          tLayer++;
          tLFrame = 0;
          const lbl = document.getElementById("tunnel-label");
          lbl.className = "";
          lbl.textContent = LAYERS[tLayer].name;
          lbl.classList.add("show");
          if (tLayer >= 2) lbl.classList.add("fear"); // peur visible
          setTimeout(() => lbl.classList.remove("show"), 1400);
          const fl = document.getElementById("flash-layer");
          fl.style.transition = "opacity .08s";
          fl.classList.add("on");
          setTimeout(() => {
            fl.style.transition = "opacity .5s";
            fl.classList.remove("on");
          }, 100);
        }

        // Screen shake increases with speed (peur)
        if (tSpd > 1.2) {
          const shakeAmt = (tSpd - 1.2) * 0.8;
          shakeX = (Math.random() - 0.5) * shakeAmt * 6;
          shakeY = (Math.random() - 0.5) * shakeAmt * 6;
        } else {
          shakeX = 0;
          shakeY = 0;
        }

        const L = LAYERS[tLayer];
        const cx = W / 2 + shakeX,
          cy = H / 2 + shakeY;

        TCX.fillStyle = "rgba(0,0,0,.18)";
        TCX.fillRect(0, 0, W, H);

        // Radial fear gradient (darker than before)
        const sky = TCX.createRadialGradient(
          cx,
          cy,
          0,
          cx,
          cy,
          Math.max(W, H) * 0.8
        );
        sky.addColorStop(0, L.bg0);
        sky.addColorStop(0.6, L.bg1);
        sky.addColorStop(1, "#000");
        TCX.globalAlpha = 0.38;
        TCX.fillStyle = sky;
        TCX.fillRect(0, 0, W, H);
        TCX.globalAlpha = 1;

        // Tunnel rings — fear tint
        for (let r = 0; r < 26; r++) {
          const depth = (r / 26 + tT * 0.17 * tSpd) % 1;
          const actualRad = Math.min(
            ((depth * 0.45 + 0.05) / (depth + 0.01)) * W * 0.34,
            W * 1.7
          );
          const alpha = Math.max(0, Math.min(0.55, depth * 1.7));
          TCX.beginPath();
          TCX.arc(cx, cy, actualRad, 0, Math.PI * 2);
          // Fear tint: more red in mid layers
          const fearTint =
            tLayer >= 2 && tLayer <= 3
              ? `rgba(200,40,10,${alpha * 0.35})`
              : `${L.ring}${alpha.toFixed(2)})`;
          TCX.strokeStyle = fearTint;
          TCX.lineWidth = 1.4 + depth * 1.6;
          TCX.stroke();
          // Secondary fear ring (darker)
          if (tLayer >= 2) {
            TCX.strokeStyle = `${L.fearColor}${(alpha * 0.4).toFixed(2)})`;
            TCX.lineWidth = 0.6;
            TCX.stroke();
          }
        }

        L.draw(cx, cy, tT);

        // Speed particles (fear colored)
        tSpd = Math.min(tSpd + 0.007, 2.2);
        TPTS.forEach((pt) => {
          pt.r -= pt.spd * (tSpd * 0.55);
          pt.a += 0.002;
          if (pt.r < 5) {
            pt.r = 250 + Math.random() * 250;
            pt.a = Math.random() * Math.PI * 2;
          }
          const x = cx + Math.cos(pt.a) * pt.r,
            y = cy + Math.sin(pt.a) * pt.r;
          const palpha = Math.max(
            0,
            Math.min(pt.al * (1 - pt.r / 500) * tSpd * 0.75, 0.9)
          );
          TCX.beginPath();
          TCX.arc(x, y, pt.sz * (1 - pt.r / 500), 0, Math.PI * 2);
          TCX.fillStyle = `${L.pt}${palpha.toFixed(2)})`;
          TCX.fill();
        });

        // Central glow (changes color by layer — fear = red/orange mid journey)
        const glowColor =
          tLayer >= 2 && tLayer <= 3 ? "rgba(255,40,0," : "rgba(0,255,136,";
        const cg = TCX.createRadialGradient(
          cx,
          cy,
          0,
          cx,
          cy,
          68 + Math.sin(tT * 3 + shakeX) * 15
        );
        cg.addColorStop(0, `${glowColor}.75)`);
        cg.addColorStop(0.5, `${glowColor}.16)`);
        cg.addColorStop(1, `${glowColor}0)`);
        TCX.fillStyle = cg;
        TCX.beginPath();
        TCX.arc(cx, cy, 74, 0, Math.PI * 2);
        TCX.fill();

        // Edge vignette
        const vg = TCX.createRadialGradient(
          cx,
          cy,
          Math.min(W, H) * 0.2,
          cx,
          cy,
          Math.max(W, H) * 0.73
        );
        vg.addColorStop(0, "rgba(0,0,0,0)");
        vg.addColorStop(1, "rgba(0,0,0,.92)");
        TCX.fillStyle = vg;
        TCX.fillRect(0, 0, W, H);

        if (tFrame < T_TOT) {
          tAnID = requestAnimationFrame(tunnelFrame);
        } else {
          cancelAnimationFrame(tAnID);
          doEntryFlash();
        }
      }

      function doEntryFlash() {
        PHASE = "entry";
        const bf = document.getElementById("blind-flash");
        let a = 0,
          up = true;
        const iv = setInterval(() => {
          if (up) {
            a += 0.08;
            if (a >= 1) up = false;
          } else {
            a -= 0.045;
            if (a <= 0) {
              clearInterval(iv);
              bf.style.opacity = "0";
              launchBrain();
            }
          }
          bf.style.opacity = a;
        }, 16);
      }
      function launchBrain() {
        TC.style.transition = "opacity .4s";
        TC.style.opacity = "0";
        setTimeout(() => {
          TC.style.display = "none";
          document.getElementById("brain-canvas").style.display = "block";
          document.getElementById("hud").classList.add("show");
          document.getElementById("tunnel-label").style.display = "none";
          PHASE = "brain";
          brainData.entryZoom = true;
          timerOn = true;
          setTimeout(() => playBrainAudio(), 300);
          initBrainVoice();
        }, 400);
      }

      // ══════════════════════════════════════════════════════════════════
      // BRAIN — Three.js (same as before, perfect)
      // ══════════════════════════════════════════════════════════════════
      const BC = document.getElementById("brain-canvas");
      BC.width = innerWidth;
      BC.height = innerHeight;

      const clock3 = new THREE.Clock();
      const cam = { yaw: 0, pitch: 0, x: 0, y: 0, z: 0 };

      document.addEventListener("mousemove", (e) => {

      });
      document.addEventListener("keydown", (e) => {
        keys[e.code] = true;
      });
      document.addEventListener("keyup", (e) => {
        keys[e.code] = false;
      });
      window.addEventListener("resize", () => {
        camera3.aspect = innerWidth / innerHeight;
        camera3.updateProjectionMatrix();
        renderer3.setSize(innerWidth, innerHeight);
        TC.width = innerWidth;
        TC.height = innerHeight;
      });

      function moveCamera(dt) {
        if (PHASE !== "brain" || enteringPortal) return;
        const spd = 3.8 * dt,
          sy = Math.sin(cam.yaw),
          cy = Math.cos(cam.yaw),
          sp = Math.sin(cam.pitch),
          cp = Math.cos(cam.pitch);
        const fwd = [-sy * cp, sp, -cy * cp],
          rgt = [cy, 0, -sy];
        if (keys["KeyW"] || keys["ArrowUp"]) {
          cam.x += fwd[0] * spd;
          cam.y += fwd[1] * spd;
          cam.z += fwd[2] * spd;
        }
        if (keys["KeyS"] || keys["ArrowDown"]) {
          cam.x -= fwd[0] * spd;
          cam.y -= fwd[1] * spd;
          cam.z -= fwd[2] * spd;
        }
        if (keys["KeyA"] || keys["ArrowLeft"]) {
          cam.x -= rgt[0] * spd;
          cam.z -= rgt[2] * spd;
        }
        if (keys["KeyD"] || keys["ArrowRight"]) {
          cam.x += rgt[0] * spd;
          cam.z += rgt[2] * spd;
        }
        const d = Math.sqrt(cam.x * cam.x + cam.z * cam.z);
        if (d > PORTAL_R - 2) {
          const f = (PORTAL_R - 2) / d;
          cam.x *= f;
          cam.z *= f;
        }
        cam.y = Math.max(-3, Math.min(3, cam.y));
        camera3.position.set(cam.x, cam.y, cam.z);
        camera3.rotation.order = "YXZ";
        camera3.rotation.y = cam.yaw;
        camera3.rotation.x = cam.pitch;
      }

      // Lights
      scene3.add(new THREE.AmbientLight(0x020508, 1));
      const centerLight = new THREE.PointLight(0x00ff88, 3, 26);
      centerLight.position.set(0, 0, 0);
      scene3.add(centerLight);
      PORTALS.forEach((p, i) => {
        const a = (p.angle * Math.PI) / 180;
        const pl = new THREE.PointLight(p.color, 0.75, 13);
        pl.position.set(
          Math.sin(a) * PORTAL_R * 0.65,
          0,
          Math.cos(a) * PORTAL_R * 0.65
        );
        scene3.add(pl);
      });

      // Cortex
      const cortexMat = new THREE.ShaderMaterial({
        uniforms: { uT: { value: 0 } },
        vertexShader: `uniform float uT;varying vec2 vUv;varying vec3 vN,vP;void main(){vUv=uv;vN=normalize(normalMatrix*normal);vP=position;float d=sin(position.x*5.+uT*2.)*sin(position.y*5.+uT*1.6)*sin(position.z*4.+uT*1.9)*.09+sin(uT*2.5)*.05;vec3 pos=position+normal*d;gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.);}`,
        fragmentShader: `uniform float uT;varying vec2 vUv;varying vec3 vN,vP;void main(){vec3 vd=normalize(cameraPosition-vP);float fr=pow(1.-abs(dot(vN,vd)),.7);float grid=step(.962,fract(vUv.x*22.))+step(.962,fract(vUv.y*22.));float pulse=sin(uT*2.2)*.5+.5;vec3 col=mix(vec3(0.,.26,.13),vec3(0.,.88,.5),fr*.9);col+=vec3(0.,.88,.5)*grid*.25+vec3(0.,.88,.5)*pulse*.18;float a=.52+fr*.38+grid*.12+pulse*.07;gl_FragColor=vec4(col,a);}`,
        transparent: true,
        blending: THREE.AdditiveBlending,
      });
      const cortex = new THREE.Mesh(
        new THREE.SphereGeometry(2, 64, 64),
        cortexMat
      );
      scene3.add(cortex);
      const cgMat = new THREE.ShaderMaterial({
        uniforms: { uT: { value: 0 } },
        vertexShader: `varying vec3 vN,vP;void main(){vN=normalize(normalMatrix*normal);vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader: `uniform float uT;varying vec3 vN,vP;void main(){vec3 vd=normalize(cameraPosition-vP);float fr=pow(1.-dot(vN,vd),3.4);float p=sin(uT*2.)*.12+.88;gl_FragColor=vec4(0.,.86,.5,fr*.44*p);}`,
        transparent: true,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      scene3.add(new THREE.Mesh(new THREE.SphereGeometry(2.55, 32, 32), cgMat));

      // Neurons
      const NC = 1800;
      const nPos = new Float32Array(NC * 3),
        nCol = new Float32Array(NC * 3),
        nSz = new Float32Array(NC);
      for (let i = 0; i < NC; i++) {
        const phi = Math.acos(-1 + 2 * Math.random()),

        nPos[i * 3] = r * Math.sin(phi) * Math.cos(th);
        nPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(th) * 0.62;
        nPos[i * 3 + 2] = r * Math.cos(phi);
        const base = new THREE.Color(0x00ff88);
        const acc = new THREE.Color(
          PCOLS[Math.floor(Math.random() * PCOLS.length)]
        );
        const c = new THREE.Color().lerpColors(base, acc, Math.random() * 0.48);
        nCol[i * 3] = c.r;
        nCol[i * 3 + 1] = c.g;
        nCol[i * 3 + 2] = c.b;
        nSz[i] = Math.random() * 2 + 0.4;
      }
      const nGeo = new THREE.BufferGeometry();
      nGeo.setAttribute("position", new THREE.BufferAttribute(nPos, 3));
      nGeo.setAttribute("color", new THREE.BufferAttribute(nCol, 3));
      nGeo.setAttribute("size", new THREE.BufferAttribute(nSz, 1));
      const nMat = new THREE.ShaderMaterial({
        uniforms: { uT: { value: 0 } },
        vertexShader: `attribute float size;attribute vec3 color;varying vec3 vC;varying float vA;uniform float uT;void main(){vC=color;vec3 p=position;float a=uT*.04+p.y*.05;float r=length(p.xz);p.x=cos(a)*r-sin(a)*p.z;p.z=sin(a)*r+cos(a)*p.z;p.y+=sin(uT*.6+r*.3)*.25;vA=.38+sin(uT*.9+r*.4+p.y*.3)*.3;vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=size*(210./-mv.z);gl_PointSize=clamp(gl_PointSize,.5,18.);gl_Position=projectionMatrix*mv;}`,
        fragmentShader: `varying vec3 vC;varying float vA;void main(){float d=length(gl_PointCoord-.5)*2.;float a=1.-smoothstep(.35,.9,d);gl_FragColor=vec4(vC,a*vA*.88);}`,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true,
      });
      scene3.add(new THREE.Points(nGeo, nMat));
      const nLines = [];
      for (let i = 0; i < 100; i++) {
        const pts = [];
        let x = (Math.random() - 0.5) * 20,
          y = (Math.random() - 0.5) * 12,
          z = (Math.random() - 0.5) * 20;
        pts.push(new THREE.Vector3(x, y, z));
        for (let j = 0; j < 5; j++) {
          x += (Math.random() - 0.5) * 4;
          y += (Math.random() - 0.5) * 3;
          z += (Math.random() - 0.5) * 4;

        const mat = new THREE.LineBasicMaterial({
          color: PCOLS[Math.floor(Math.random() * PCOLS.length)],

          new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat)
        );
        nLines.push({ mat, base: mat.opacity });
      }

      // Synapses
      const SC = 3200;
      const sPos = new Float32Array(SC * 3),
        sCol = new Float32Array(SC * 3),
        sSz = new Float32Array(SC);
      for (let i = 0; i < SC; i++) {
        const phi = Math.acos(-1 + 2 * Math.random()),
          th = Math.random() * Math.PI * 2,
          r = 1.5 + Math.random() * 14;

        sPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(th) * 0.5;
        sPos[i * 3 + 2] = r * Math.cos(phi);

        );
        sCol[i * 3] = c.r;
        sCol[i * 3 + 1] = c.g;
        sCol[i * 3 + 2] = c.b;
        sSz[i] = Math.random() * 1.8 + 0.3;

      const sGeo = new THREE.BufferGeometry();

      sGeo.setAttribute("color", new THREE.BufferAttribute(sCol, 3));
      sGeo.setAttribute("size", new THREE.BufferAttribute(sSz, 1));
      const sMat = new THREE.ShaderMaterial({
        uniforms: { uT: { value: 0 } },
        vertexShader: `attribute float size;attribute vec3 color;varying vec3 vC;uniform float uT;void main(){vC=color;vec3 p=position;float ang=uT*.055+p.z*.07;float r=length(p.xy);p.x=cos(ang)*r-sin(ang)*p.y;p.y=sin(ang)*r+cos(ang)*p.y;p.z+=sin(uT*.5+r*.38)*.38;vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=size*(175./-mv.z);gl_PointSize=clamp(gl_PointSize,.3,12.);gl_Position=projectionMatrix*mv;}`,
        fragmentShader: `varying vec3 vC;void main(){float d=length(gl_PointCoord-.5)*2.;float a=1.-smoothstep(.22,.82,d);gl_FragColor=vec4(vC,a*.62);}`,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,

      });
      scene3.add(new THREE.Points(sGeo, sMat));

      // Background galaxy
      const BG = 8000;
      const bgP = new Float32Array(BG * 3),
        bgC = new Float32Array(BG * 3);
      for (let i = 0; i < BG; i++) {
        const phi = Math.acos(-1 + 2 * Math.random()),
          th = Math.random() * Math.PI * 2,

        bgP[i * 3] = r * Math.sin(phi) * Math.cos(th);
        bgP[i * 3 + 1] = r * Math.sin(phi) * Math.sin(th);
        bgP[i * 3 + 2] = r * Math.cos(phi);

      // Portals
      const pObjects = [];
      PORTALS.forEach((p, i) => {

        const dMat = new THREE.ShaderMaterial({
          uniforms: {
            uT: { value: 0 },
            uC: { value: new THREE.Color(p.color) },
            uIdx: { value: i },
            uLk: { value: p.locked ? 1 : 0 },
          },
          vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
          fragmentShader: `uniform float uT,uIdx,uLk;uniform vec3 uC;varying vec2 vUv;void main(){vec2 uv=vUv-.5;float d=length(uv);float ring=smoothstep(.44,.38,d)-smoothstep(.3,.24,d);float inner=smoothstep(.23,0.,d);float p=sin(uT*3.+uIdx*1.05)*.35+.65;float scan=sin(uv.y*28.+uT*3.5)*.04+.96;float spin=sin(atan(uv.y,uv.x)*6.+uT*2.)*.5+.5;vec3 col=uC*(uLk>.5?.22:.82);float a=(ring*.7+inner*.35*spin*scan)*p*(uLk>.5?.38:1.);gl_FragColor=vec4(col,a);}`,
          transparent: true,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,

        });
        const disc = new THREE.Mesh(new THREE.CircleGeometry(0.88, 64), dMat);
        disc.position.set(px, py, pz);
        disc.lookAt(0, py, 0);
        scene3.add(disc);
        const curve = new THREE.CatmullRomCurve3([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(px * 0.55, py, pz * 0.55),
          new THREE.Vector3(px, py, pz),
        ]);
        scene3.add(
          new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(curve.getPoints(60)),
            new THREE.LineBasicMaterial({
              color: p.color,
              transparent: true,
              opacity: 0.18,
            })
          )
        );
        pObjects.push({ ring, disc, dMat, rMat, px, py, pz, p });
      });

      // ── PORTAL DETECTION ──
      function updatePortals() {
        let minD = 99,
          minI = -1;
        pObjects.forEach((po, i) => {
          const dx = cam.x - po.px,
            dy = cam.y - po.py,
            dz = cam.z - po.pz;
          const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
          if (d < minD) {
            minD = d;
            minI = i;
          }
        });
        const near = minD < 4.2 ? minI : -1;
        if (near !== lastNearIdx) {
          lastNearIdx = near;
          nearPortalIdx = near;
          if (near >= 0) {
            showPortalTip(near);
            playPortalChime(180 + near * 22);
            document.getElementById("portal-enter").classList.add("show");
            $cur.classList.add("big");
            // Heart portal specific dialogue (plays once)
            if (near === 0 && !heartDialoguePlayed) {
              heartDialoguePlayed = true;
              stopVoice();
              setTimeout(() => playHeartPortalDialogue(), 400);
            }
          } else {
            document.getElementById("portal-tip").classList.remove("show");
            document.getElementById("portal-enter").classList.remove("show");
            $cur.classList.remove("big");
          }
        }
      }

      function showPortalTip(idx) {
        const p = PORTALS[idx];
        document.getElementById("pt-icon").textContent = p.icon;
        document.getElementById("pt-name").textContent = p.name;
        document.getElementById("pt-name").style.color = p.hex;
        document.getElementById("pt-status").textContent = p.status;
        document.getElementById("pt-mission").textContent = p.mission;
        document.getElementById("pt-inner").style.borderColor = p.hex + "33";
        const ac = document.getElementById("pt-access");
        if (!p.locked) {
          ac.textContent = "✓ ACCESSIBLE — ENTRER";
          ac.className = "pt-access open";
          ac.style.borderColor = p.hex + "55";
          ac.style.color = p.hex;
        } else {
          ac.textContent = "🔒 VERROUILLÉ — COMPLETEZ LE STAGE PRÉCÉDENT";
          ac.className = "pt-access locked";
        }
        const tip = document.getElementById("portal-tip");
        tip.style.left = "50%";
        tip.style.bottom = "250px";
        tip.style.transform = "translateX(-50%)";
        tip.classList.add("show");
      }

      // ── HEART PORTAL DIALOGUE ──
      function playHeartPortalDialogue() {
        const text = `Mon cœur... Il bat si fort en ce moment.\nTrop fort. Trop vite.\nComme s'il était en panique constante.\n\nVous allez comprendre pourquoi...`;
        speakAndType(text, () => {
          setTimeout(() => hideVoiceBox(), 3000);
        });
      }

      // ══════════════════════════════════════════════════════════════════
      // ENTER PORTAL — FLASH VERT + TUNNEL VEINES + BOOM + SCÈNE 4
      // ══════════════════════════════════════════════════════════════════
      function enterPortal() {
        if (nearPortalIdx < 0 || enteringPortal) return;
        const p = PORTALS[nearPortalIdx];
        if (p.locked) {
          document.getElementById("pt-inner").style.boxShadow =
            "0 0 24px rgba(255,50,50,.6)";
          setTimeout(
            () => (document.getElementById("pt-inner").style.boxShadow = ""),
            800
          );
          return;
        }
        enteringPortal = true;
        stopVoice();
        // Unlock pointer
        if (document.pointerLockElement) document.exitPointerLock();

        // Hide HUD
        document.getElementById("portal-tip").classList.remove("show");
        document.getElementById("portal-enter").classList.remove("show");

        score += 100;
        document.getElementById("score-val").textContent = `SCORE : ${score}`;
        document.getElementById("score-display").textContent = score;

        // 1. BLINDING GREEN FLASH
        const bf = document.getElementById("blind-flash");
        bf.style.background = "#00ff88";
        bf.style.transition = "none";
        bf.style.opacity = "1";
        setTimeout(() => {
          bf.style.transition = "opacity .4s";
          bf.style.opacity = "0";
          // 2. Start vein tunnel
          setTimeout(() => startVeinTunnel(), 300);
        }, 120);
      }

      // ── VEIN TUNNEL ──
      function startVeinTunnel() {
        document.getElementById("hud").style.opacity = "0";
        const vc = document.getElementById("vein-canvas");
        vc.width = innerWidth;
        vc.height = innerHeight;
        vc.style.display = "block";
        const ctx = vc.getContext("2d");
        const W = vc.width,
          H = vc.height,
          cx = W / 2,
          cy = H / 2;

        playHeartTunnelAudio();

        const veins = Array.from({ length: 28 }, () => ({
          angle: Math.random() * Math.PI * 2,
          r: Math.random() * 120 + 60,
          width: Math.random() * 10 + 3,
          phase: Math.random() * Math.PI * 2,
          seg: Math.random() * 4 + 3,
        }));

        let frame = 0,
          totalFrames = 210;
        const booms = ["BOOM...", "BOOM.", "BOOM!"];
        let boomIdx = 0,
          boomAlpha = 0,
          boomShown = false;

        function draw() {
          frame++;
          const progress = frame / totalFrames;
          ctx.fillStyle = `rgba(0,0,0,${0.15 + progress * 0.04})`;
          ctx.fillRect(0, 0, W, H);

          // Deep red background
          const grd = ctx.createRadialGradient(
            cx,
            cy,
            0,
            cx,
            cy,
            350 + Math.sin(frame * 0.12) * 60
          );
          grd.addColorStop(
            0,
            `rgba(${100 + Math.floor(progress * 60)},0,8,${0.45 * progress})`
          );
          grd.addColorStop(0.5, `rgba(50,0,4,${0.35 * progress})`);
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, W, H);

          // Pulsing veins
          veins.forEach((v) => {
            const pulse = Math.sin(frame * 0.14 + v.phase) * 0.35 + 0.65;
            const spread = progress * 500;
            const x1 = cx + Math.cos(v.angle) * v.r,
              y1 = cy + Math.sin(v.angle) * v.r;
            const x2 = cx + Math.cos(v.angle + 0.25) * (v.r + spread),
              y2 = cy + Math.sin(v.angle + 0.25) * (v.r + spread);
            const r2 = Math.floor(180 + pulse * 75),
              g2 = Math.floor(pulse * 18),
              b2 = Math.floor(pulse * 18);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            // Curved veins with control points
            const cpx = cx + Math.cos(v.angle + 0.12) * v.r * 0.6,
              cpy = cy + Math.sin(v.angle + 0.12) * v.r * 0.6;
            ctx.quadraticCurveTo(x1, y1, x2, y2);
            ctx.strokeStyle = `rgba(${r2},${g2},${b2},${pulse * 0.7})`;
            ctx.lineWidth = v.width * (1 + progress * 2.5);
            ctx.stroke();
            // Glow
            ctx.strokeStyle = `rgba(255,${Math.floor(pulse * 30)},${Math.floor(
              pulse * 30
            )},${pulse * 0.25})`;
            ctx.lineWidth = v.width * (1 + progress * 2.5) * 1.8;
            ctx.stroke();
          });

          // Energy particles flowing toward center
          for (let i = 0; i < 12; i++) {
            const angle = frame * 0.06 * i + i * 1.3;
            const r = Math.max(5, (1 - (progress % 1)) * 0.5) * 350;
            const x = cx + Math.cos(angle) * r,
              y = cy + Math.sin(angle) * r;
            const pa = Math.max(0, 0.8 * (1 - r / 350));
            ctx.beginPath();
            ctx.arc(x, y, 4 + progress * 5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,50,50,${pa})`;
            ctx.fill();
          }

          // BOOM text appears at specific frames
          if (frame === 50 || frame === 90 || frame === 130) {
            boomAlpha = 1;
            boomShown = true;
            const bt = document.getElementById("boom-text");
            bt.textContent = booms[boomIdx % 3];
            boomIdx++;
            bt.style.opacity = "1";
            bt.style.transform = "translate(-50%,-50%) scale(1.2)";
            bt.style.transition = "all .08s";
            setTimeout(() => {
              bt.style.opacity = "0";
              bt.style.transform = "translate(-50%,-50%) scale(.8)";
              bt.style.transition = "all .4s";
            }, 400);
          }

          // Pulse flash sync with heartbeat
          if (frame % 28 < 3) {
            ctx.fillStyle = `rgba(180,0,0,${0.06 + progress * 0.08})`;
            ctx.fillRect(0, 0, W, H);
          }

          if (frame < totalFrames) {
            requestAnimationFrame(draw);
          } else {
            // Black curtain → scene 4
            document.getElementById("boom-text").style.opacity = "0";
            const curt = document.getElementById("curtain");
            curt.style.transition = "opacity 1.6s ease";
            curt.classList.remove("gone");
            curt.style.opacity = "1";
            setTimeout(() => {
              try {
                localStorage.setItem("gaiaPlayerName", playerName);
              } catch (e) {}
              window.location.href = "scene4.html";
            }, 1800);
          }
        }
        requestAnimationFrame(draw);
      }

      // ── MINIMAP ──
      const mmC = document.getElementById("minimap-canvas"),
        mmX = mmC.getContext("2d");
      function drawMinimap() {
        const W = 118,
          H = 118,
          cx = W / 2,
          cy = H / 2,
          R = W / 2 - 5;
        mmX.clearRect(0, 0, W, H);
        mmX.fillStyle = "rgba(0,5,2,.88)";
        mmX.beginPath();
        mmX.arc(cx, cy, R, 0, Math.PI * 2);
        mmX.fill();
        mmX.strokeStyle = "rgba(0,255,136,.14)";
        mmX.lineWidth = 1.5;
        mmX.beginPath();
        mmX.arc(cx, cy, R, 0, Math.PI * 2);
        mmX.stroke();
        const cg = mmX.createRadialGradient(cx, cy, 0, cx, cy, 10);
        cg.addColorStop(0, "rgba(0,255,136,.95)");
        cg.addColorStop(1, "rgba(0,255,136,0)");
        mmX.fillStyle = cg;
        mmX.beginPath();
        mmX.arc(cx, cy, 10, 0, Math.PI * 2);
        mmX.fill();
        PORTALS.forEach((p, i) => {
          const a = (p.angle * Math.PI) / 180,
            mx = cx + Math.sin(a) * R * 0.8,
            my = cy + Math.cos(a) * R * 0.8;
          mmX.beginPath();
          mmX.moveTo(cx, cy);
          mmX.lineTo(mx, my);
          mmX.strokeStyle = p.hex + "2a";
          mmX.lineWidth = 0.55;
          mmX.stroke();
          const isN = nearPortalIdx === i;
          mmX.beginPath();
          mmX.arc(mx, my, isN ? 6.5 : 4, 0, Math.PI * 2);
          mmX.fillStyle = isN
            ? p.hex
            : p.locked
            ? "rgba(70,70,70,.5)"
            : p.hex + "99";
          mmX.fill();
          if (isN) {
            mmX.strokeStyle = p.hex;
            mmX.lineWidth = 1.5;
            mmX.beginPath();
            mmX.arc(mx, my, 9.5, 0, Math.PI * 2);
            mmX.stroke();
          }
        });
        const ppx = cx + (cam.x / PORTAL_R) * R * 0.8,
          ppy = cy + (cam.z / PORTAL_R) * R * 0.8;
        const dd = Math.sqrt((ppx - cx) ** 2 + (ppy - cy) ** 2);
        const fx = dd > R - 6 ? cx + ((ppx - cx) * (R - 6)) / dd : ppx,
          fy = dd > R - 6 ? cy + ((ppy - cy) * (R - 6)) / dd : ppy;
        mmX.fillStyle = "#fff";
        mmX.beginPath();
        mmX.arc(fx, fy, 3.5, 0, Math.PI * 2);
        mmX.fill();
        mmX.strokeStyle = "rgba(255,255,255,.7)";
        mmX.lineWidth = 1.5;
        mmX.beginPath();
        mmX.moveTo(fx, fy);
        mmX.lineTo(fx + Math.sin(-cam.yaw) * 10, fy + Math.cos(-cam.yaw) * 10);
        mmX.stroke();
      }

      // ── RENDER LOOP ──
      function animateBrain() {
        requestAnimationFrame(animateBrain);
        if (PHASE === "tunnel") return;
        const dt = Math.min(clock3.getDelta(), 0.05);
        brainData.time += dt;
        const t = brainData.time;
        if (brainData.entryZoom) {
          brainData.entryT += dt * 1.3;
          const prog = Math.min(brainData.entryT / 2.8, 1);
          camera3.fov = 115 - 40 * prog;
          camera3.updateProjectionMatrix();
          if (prog >= 1) {
            brainData.entryZoom = false;
            camera3.fov = 75;
            camera3.updateProjectionMatrix();
          }
        }
        moveCamera(dt);
        if (PHASE === "brain" && !enteringPortal) {
          updatePortals();
          drawMinimap();
        }
        cortexMat.uniforms.uT.value = t;
        cgMat.uniforms.uT.value = t;
        cortex.rotation.y = t * 0.07;
        cortex.rotation.x = t * 0.04;
        centerLight.intensity = 2 + Math.sin(t * 2.4) * 0.5 * 1.6;
        pObjects.forEach(({ disc, dMat, rMat, ring }, i) => {
          dMat.uniforms.uT.value = t;
          const s = 1 + Math.sin(t * 2 + i * 1.1) * 0.055;
          disc.scale.set(s, s, 1);
          ring.scale.set(s, s, 1);
          ring.rotation.z = t * 0.32 + i * 0.5;
          rMat.opacity =
            0.48 +
            Math.sin(t * 1.7 + i) * 0.27 +
            (nearPortalIdx === i ? 0.25 : 0);
        });
        nMat.uniforms.uT.value = t;
        sMat.uniforms.uT.value = t;
        nLines.forEach(({ mat, base }, i) => {
          mat.opacity = base * (Math.sin(t * 0.7 + i * 0.5) * 0.4 + 0.6);
        });
        renderer3.render(scene3, camera3);
      }

      // ── GAÏA VOICE — brain intro ──
      function initBrainVoice() {
        setTimeout(() => {
          const text = `Bienvenue dans mon esprit... ${playerName}.\nVoici le centre de ma conscience.\nD'ici... je contrôle tout mon corps.\n\nChaque portail mène à un organe vital.\nMais je dois vous avertir...\n\nMes systèmes sont malades.\nCertains... sont au bord de l'effondrement.\n\nVous devez les visiter.\nLes diagnostiquer.\nLes guérir.\n\nMais l'ordre est important.\nCommencez par mon CŒUR.\nC'est là que tout commence...\nC'est là que tout peut finir.`;
          speakAndType(text, () => {
            setTimeout(() => hideVoiceBox(), 4000);
          });
        }, 1200);
      }

      function hideVoiceBox() {
        const card = document.getElementById("vb-card");
        card.style.transition = "opacity 1s";
        card.style.opacity = "0";
        setTimeout(() => {
          card.classList.remove("show");
          card.style.opacity = "";
          card.style.transition = "";
        }, 1000);
        document.getElementById("vb-sep").classList.remove("show");
      }

      // ══ INIT ══
      function init() {
        initAudio();
        const lbl = document.getElementById("tunnel-label");
        lbl.textContent = LAYERS[0].name;
        lbl.classList.add("show");
        setTimeout(() => lbl.classList.remove("show"), 1300);
        setTimeout(() => playTunnelAudio(), 400);
        const curt = document.getElementById("curtain");
        curt.style.transition = "opacity 1.1s ease";
        setTimeout(() => curt.classList.add("gone"), 100);
        animateBrain();
        requestAnimationFrame(tunnelFrame);
      }
      window.addEventListener("load", init);
    </script>
  </body>
