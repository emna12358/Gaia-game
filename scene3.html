<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>GAÏA — Scène 3</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --g: #00ff88;
        --gd: #00cc66;
        --soft: #d0f0e0;
        --ui: rgba(0, 8, 4, 0.93);
        --ub: rgba(0, 255, 136, 0.16);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      body {
        font-family: "EB Garamond", Georgia, serif;
        cursor: none;
        opacity: 0;
        animation: pi 0.5s ease 0.05s forwards;
      }
      @keyframes pi {
        to {
          opacity: 1;
        }
      }
      #cur {
        position: fixed;
        width: 16px;
        height: 16px;
        border: 1.5px solid rgba(0, 255, 136, 0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.15s, height 0.15s;
      }
      #cur::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 3px;
        background: var(--g);
        border-radius: 50%;
      }
      #cur.big {
        width: 28px;
        height: 28px;
        border-color: var(--g);
        box-shadow: 0 0 14px var(--g);
      }
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }
      #tc {
        z-index: 100;
      }
      #bc {
        z-index: 1;
        display: none;
      }
      #oc {
        z-index: 3;
        display: none;
        pointer-events: none;
      }
      #vc {
        z-index: 400;
        display: none;
      }
      #vig {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        background: radial-gradient(
          ellipse 80% 80% at 50%50%,
          transparent 25%,
          rgba(0, 0, 0, 0.12) 55%,
          rgba(0, 0, 0, 0.82) 100%
        );
      }
      #fl {
        position: fixed;
        inset: 0;
        z-index: 300;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s;
      }
      #fl.on {
        opacity: 1;
      }
      #bf {
        position: fixed;
        inset: 0;
        z-index: 450;
        pointer-events: none;
        opacity: 0;
      }
      #curtain {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: #000;
        opacity: 1;
        pointer-events: none;
        transition: opacity 1.4s ease;
      }
      #curtain.gone {
        opacity: 0;
      }
      #tl {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 110;
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.45em;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        padding: 5px 18px;
        border-radius: 2px;
        white-space: nowrap;
      }
      #tl.show {
        opacity: 1;
      }
      #tl.atmos {
        color: rgba(160, 200, 255, 0.75);
        background: rgba(0, 0, 20, 0.5);
        border: 1px solid rgba(100, 150, 255, 0.15);
      }
      #tl.clouds {
        color: rgba(255, 200, 140, 0.75);
        background: rgba(20, 10, 0, 0.5);
      }
      #tl.rocks {
        color: rgba(255, 130, 60, 0.85);
        background: rgba(20, 3, 0, 0.55);
        border: 1px solid rgba(220, 80, 20, 0.2);
      }
      #tl.roots {
        color: rgba(80, 255, 150, 0.75);
        background: rgba(0, 14, 3, 0.5);
      }
      #tl.cells {
        color: rgba(0, 255, 210, 0.75);
        background: rgba(0, 10, 8, 0.5);
      }
      #tl.fear {
        animation: fp 0.5s ease-in-out infinite alternate;
      }
      @keyframes fp {
        from {
          opacity: 0.4;
        }
        to {
          opacity: 0.82;
        }
      }
      /* HUD */
      #hud {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #hud.show {
        opacity: 1;
      }
      #top {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px 0;
      }
      .tl {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.5em;
        color: rgba(0, 255, 136, 0.28);
      }
      .tc {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 0.38em;
        color: rgba(0, 255, 136, 0.2);
      }
      .tr {
        display: flex;
        gap: 20px;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.25em;
        color: rgba(0, 255, 136, 0.35);
      }
      #xh {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
      }
      #xh.show {
        opacity: 0.55;
      }
      .ch {
        position: absolute;
        background: rgba(0, 255, 136, 0.65);
      }
      .ch-h {
        width: 14px;
        height: 1px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .ch-v {
        width: 1px;
        height: 14px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .ch-c {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--g);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      #hp {
        position: absolute;
        top: 56px;
        right: 24px;
        width: 260px;
        background: var(--ui);
        border: 1px solid var(--ub);
        backdrop-filter: blur(22px);
        border-radius: 3px;
        overflow: hidden;
        pointer-events: all;
        transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 46px;
      }
      #hp.open {
        max-height: 290px;
      }
      #hph {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 16px;
        cursor: pointer;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.38em;
        color: rgba(0, 255, 136, 0.6);
      }
      #hpt {
        font-size: 9px;
        transition: transform 0.35s;
        color: rgba(0, 255, 136, 0.45);
      }
      #hp.open #hpt {
        transform: rotate(180deg);
      }
      #hpb {
        padding: 12px 16px 14px;
      }
      .hr {
        margin-bottom: 10px;
      }
      .ht {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .hl {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.5);
      }
      .hv {
        font-family: "Cinzel", serif;
        font-size: 8px;
      }
      .hk {
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .hf {
        height: 100%;
        border-radius: 2px;
      }
      .cw {
        color: #ffaa33;
      }
      .cc {
        color: #ff4444;
      }
      /* PORTAL TIP */
      #pt {
        position: absolute;
        pointer-events: none;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.3s, transform 0.3s;
        z-index: 30;
      }
      #pt.show {
        opacity: 1;
        transform: translateY(0);
      }
      #pti {
        background: rgba(2, 12, 6, 0.97);
        border-width: 1px;
        border-style: solid;
        backdrop-filter: blur(28px);
        border-radius: 4px;
        padding: 18px 22px 15px;
        min-width: 255px;
        box-shadow: 0 8px 50px rgba(0, 0, 0, 0.9);
      }
      #pta {
        height: 2px;
        border-radius: 2px;
        margin-bottom: 14px;
      }
      .pic {
        font-size: 26px;
        display: block;
        margin-bottom: 8px;
      }
      .pnu {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.3em;
        opacity: 0.42;
        margin-bottom: 3px;
      }
      .pna {
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.2em;
        margin-bottom: 6px;
        font-weight: 600;
      }
      .pbg {
        display: inline-flex;
        align-items: center;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.18em;
        padding: 4px 10px;
        border-radius: 20px;
        margin-bottom: 8px;
      }
      .pbg.warn {
        background: rgba(255, 160, 30, 0.12);
        border: 1px solid rgba(255, 160, 30, 0.32);
        color: #ffaa33;
      }
      .pbg.crit {
        background: rgba(255, 60, 60, 0.12);
        border: 1px solid rgba(255, 60, 60, 0.32);
        color: #ff5555;
      }
      .pbg.ok {
        background: rgba(0, 255, 136, 0.1);
        border: 1px solid rgba(0, 255, 136, 0.28);
        color: #00ff88;
      }
      .pbg.lock {
        background: rgba(150, 150, 150, 0.1);
        border: 1px solid rgba(150, 150, 150, 0.2);
        color: #aaa;
      }
      .pml {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.25em;
        color: rgba(255, 255, 255, 0.28);
        margin-bottom: 3px;
      }
      .pms {
        font-family: "EB Garamond", serif;
        font-size: 14px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.75);
        margin-bottom: 9px;
      }
      .pdv {
        height: 1px;
        background: rgba(255, 255, 255, 0.07);
        margin: 7px 0;
      }
      .pac {
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.2em;
        padding: 6px 12px;
        border-radius: 2px;
        display: inline-block;
        font-weight: 600;
      }
      .pac.open {
        color: #00ff88;
        border: 1px solid rgba(0, 255, 136, 0.4);
        background: rgba(0, 255, 136, 0.08);
      }
      .pac.locked {
        color: rgba(200, 200, 200, 0.38);
        border: 1px solid rgba(200, 200, 200, 0.12);
      }
      /* ENTER BTN */
      #pen {
        position: fixed;
        bottom: 155px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
      }
      #pen.show {
        opacity: 1;
        pointer-events: all;
      }
      #pen button {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: #00ff88;
        background: rgba(0, 6, 3, 0.96);
        border: 1px solid rgba(0, 255, 136, 0.6);
        padding: 14px 44px;
        cursor: pointer;
        transition: all 0.3s;
        border-radius: 2px;
        box-shadow: 0 0 28px rgba(0, 255, 136, 0.15);
      }
      #pen button:hover {
        background: rgba(0, 255, 136, 0.12);
        box-shadow: 0 0 45px rgba(0, 255, 136, 0.4);
      }
      /* VOICE */
      #vb {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(700px, 90vw);
        padding: 0 0 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
      }
      #vs {
        width: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 136, 0.45),
          transparent
        );
        margin-bottom: 12px;
        transition: width 1s ease;
      }
      #vs.show {
        width: 100%;
      }
      #vc2 {
        width: 100%;
        background: var(--ui);
        border: 1px solid var(--ub);
        backdrop-filter: blur(26px);
        border-radius: 3px;
        padding: 18px 26px 16px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.8s, transform 0.8s;
        pointer-events: all;
      }
      #vc2.show {
        opacity: 1;
        transform: translateY(0);
      }
      #vsr {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      #vnm {
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.42em;
        color: rgba(0, 255, 136, 0.45);
      }
      #vbr {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #vbr.on {
        opacity: 1;
      }
      .vb {
        width: 2px;
        border-radius: 1px;
        background: var(--gd);
        transform-origin: bottom;
        animation: vba 1s ease-in-out infinite alternate;
      }
      .vb:nth-child(1) {
        height: 3px;
        animation-duration: 0.38s;
      }
      .vb:nth-child(2) {
        height: 10px;
        animation-duration: 0.52s;
        animation-delay: 0.04s;
      }
      .vb:nth-child(3) {
        height: 5px;
        animation-duration: 0.41s;
        animation-delay: 0.09s;
      }
      .vb:nth-child(4) {
        height: 12px;
        animation-duration: 0.58s;
        animation-delay: 0.07s;
      }
      .vb:nth-child(5) {
        height: 4px;
        animation-duration: 0.44s;
        animation-delay: 0.11s;
      }
      .vb:nth-child(6) {
        height: 8px;
        animation-duration: 0.49s;
        animation-delay: 0.03s;
      }
      @keyframes vba {
        from {
          transform: scaleY(0.18);
          opacity: 0.5;
        }
        to {
          transform: scaleY(1);
          opacity: 1;
        }
      }
      #vtx {
        font-family: "EB Garamond", serif;
        font-size: clamp(13px, 1.65vw, 16px);
        line-height: 2;
        color: var(--soft);
        white-space: pre-wrap;
        max-height: 140px;
        overflow-y: auto;
        scrollbar-width: none;
      }
      #vtx::-webkit-scrollbar {
        display: none;
      }
      #twc {
        display: inline-block;
        width: 2px;
        height: 14px;
        background: var(--g);
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      #bl {
        position: absolute;
        bottom: 24px;
        left: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .bi {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .bll {
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.28em;
        color: rgba(0, 255, 136, 0.35);
      }
      .blv {
        font-family: "Cinzel", serif;
        font-size: 17px;
        letter-spacing: 0.12em;
        color: var(--g);
      }
      #mw {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 118px;
        height: 118px;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid rgba(0, 255, 136, 0.22);
        background: rgba(0, 6, 3, 0.88);
      }
      #mc {
        display: block;
        position: static !important;
        width: 118px !important;
        height: 118px !important;
      }
      #mh {
        position: absolute;
        bottom: 155px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Cinzel", serif;
        font-size: 7px;
        letter-spacing: 0.3em;
        color: rgba(0, 255, 136, 0.3);
        white-space: nowrap;
        pointer-events: none;
        animation: hf 3s ease 4s forwards;
      }
      @keyframes hf {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      /* TRANSITION OVERLAYS */
      #bo {
        position: fixed;
        inset: 0;
        z-index: 410;
        pointer-events: none;
        opacity: 0;
      }
      #bt {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 420;
        font-family: "Cinzel", serif;
        font-size: clamp(80px, 16vw, 190px);
        font-weight: 900;
        color: #ff2200;
        letter-spacing: 0.06em;
        opacity: 0;
        pointer-events: none;
        text-shadow: 0 0 80px rgba(255, 30, 0, 0.9),
          0 0 200px rgba(255, 0, 0, 0.5);
      }
      #ek {
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 415;
        pointer-events: none;
        opacity: 0;
      }
      #ft {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 418;
        font-family: "Cinzel", serif;
        font-size: clamp(14px, 2.5vw, 22px);
        letter-spacing: 0.4em;
        color: transparent;
        pointer-events: none;
        text-align: center;
        text-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
      }
      #ab {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
        font-family: "Cinzel", serif;
        font-size: 8px;
        letter-spacing: 0.3em;
        color: rgba(0, 255, 136, 0.22);
        cursor: pointer;
        transition: color 0.3s;
        pointer-events: all;
      }
      #ab:hover {
        color: rgba(0, 255, 136, 0.65);
      }
    </style>
  </head>
  <body>
    <div id="cur"></div>
    <canvas id="tc"></canvas>
    <canvas id="bc"></canvas>
    <canvas id="oc"></canvas>
    <canvas id="vc"></canvas>
    <div id="vig"></div>
    <div id="fl"></div>
    <div id="bf"></div>
    <div id="tl"></div>
    <div id="bo"></div>
    <div id="bt"></div>
    <div id="ft"></div>
    <canvas id="ek"></canvas>

    <div id="hud">
      <div id="top">
        <div class="tl">G A Ï A</div>
        <div class="tc">C O N S C I E N C E — H U B</div>
        <div class="tr">
          <span id="sv">SCORE : 0</span><span id="tv">00:00</span>
        </div>
      </div>
      <div id="xh">
        <div class="ch ch-h"></div>
        <div class="ch ch-v"></div>
        <div class="ch ch-c"></div>
      </div>
      <div id="hp" onclick="toggleHP()">
        <div id="hph">ÉTAT DE SANTÉ DE GAÏA <span id="hpt">▼</span></div>
        <div id="hpb">
          <div class="hr">
            <div class="ht">
              <span class="hl">SANTÉ GLOBALE</span
              ><span class="hv cw">67/100</span>
            </div>
            <div class="hk">
              <div
                class="hf"
                style="
                  width: 67%;
                  background: linear-gradient(90deg, #ff4444, #ffaa33, #00ff88);
                "
              ></div>
            </div>
          </div>
          <div class="hr">
            <div class="ht">
              <span class="hl">TEMPÉRATURE</span
              ><span class="hv cw">+1.2°C ⚠</span>
            </div>
            <div class="hk">
              <div class="hf" style="width: 62%; background: #ffaa33"></div>
            </div>
          </div>
          <div class="hr">
            <div class="ht">
              <span class="hl">BIODIVERSITÉ</span
              ><span class="hv cc">−30% 🔴</span>
            </div>
            <div class="hk">
              <div class="hf" style="width: 35%; background: #ff4444"></div>
            </div>
          </div>
          <div class="hr">
            <div class="ht">
              <span class="hl">POLLUTION</span
              ><span class="hv cw">ÉLEVÉE ⚠</span>
            </div>
            <div class="hk">
              <div class="hf" style="width: 78%; background: #ffaa33"></div>
            </div>
          </div>
          <div class="hr">
            <div class="ht">
              <span class="hl">ÉNERGIES VERTES</span
              ><span class="hv" style="color: #ffcc00">38%</span>
            </div>
            <div class="hk">
              <div class="hf" style="width: 38%; background: #ffcc00"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="pt">
        <div id="pti">
          <div id="pta"></div>
          <span class="pic" id="pic"></span>
          <div class="pnu" id="pnu"></div>
          <div class="pna" id="pna"></div>
          <span class="pbg" id="pst"></span>
          <div class="pml">MISSION</div>
          <div class="pms" id="pms"></div>
          <div class="pdv"></div>
          <span class="pac" id="pac"></span>
        </div>
      </div>
      <div id="vb">
        <div id="vs"></div>
        <div id="vc2">
          <div id="vsr">
            <span id="vnm">G A Ï A</span
            ><span id="vbr"
              ><span class="vb"></span><span class="vb"></span
              ><span class="vb"></span><span class="vb"></span
              ><span class="vb"></span><span class="vb"></span
            ></span>
          </div>
          <div id="vtx"></div>
          <span id="twc"></span>
        </div>
      </div>
      <div id="bl">
        <div class="bi">

        sSz[i] = Math.random() * 1.8 + 0.3;
      }
      const sGeo = new THREE.BufferGeometry();
      sGeo.setAttribute("position", new THREE.BufferAttribute(sPos, 3));
      sGeo.setAttribute("color", new THREE.BufferAttribute(sCol, 3));
      sGeo.setAttribute("size", new THREE.BufferAttribute(sSz, 1));
      const sMat = new THREE.ShaderMaterial({
        uniforms: { uT: { value: 0 } },
        vertexShader: `attribute float size;attribute vec3 color;varying vec3 vC;uniform float uT;void main(){vC=color;vec3 p=position;float ang=uT*.05+p.z*.065;float r=length(p.xy);p.x=cos(ang)*r-sin(ang)*p.y;p.y=sin(ang)*r+cos(ang)*p.y;p.z+=sin(uT*.45+r*.35)*.35;vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=size*(185./-mv.z);gl_PointSize=clamp(gl_PointSize,.3,14.);gl_Position=projectionMatrix*mv;}`,
        fragmentShader: `varying vec3 vC;void main(){float d=length(gl_PointCoord-.5)*2.;float a=1.-smoothstep(.2,.8,d);gl_FragColor=vec4(vC,a*.65);}`,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true,
      });
      sc3.add(new THREE.Points(sGeo, sMat));
      const BG = 8000;
      const bgP = new Float32Array(BG * 3),
        bgC = new Float32Array(BG * 3);
      for (let i = 0; i < BG; i++) {
        const phi = Math.acos(-1 + 2 * Math.random()),
          th = Math.random() * Math.PI * 2,
          r = 20 + Math.random() * 80;
        bgP[i * 3] = r * Math.sin(phi) * Math.cos(th);
        bgP[i * 3 + 1] = r * Math.sin(phi) * Math.sin(th);
        bgP[i * 3 + 2] = r * Math.cos(phi);
        const c = new THREE.Color().setHSL(
          Math.random() * 0.4 + 0.5,
          Math.random() * 0.6 + 0.2,
          Math.random() * 0.35 + 0.12
        );
        bgC[i * 3] = c.r;
        bgC[i * 3 + 1] = c.g;
        bgC[i * 3 + 2] = c.b;
      }
      const bgGeo = new THREE.BufferGeometry();
      bgGeo.setAttribute("position", new THREE.BufferAttribute(bgP, 3));
      bgGeo.setAttribute("color", new THREE.BufferAttribute(bgC, 3));
      sc3.add(
        new THREE.Points(
          bgGeo,
          new THREE.PointsMaterial({
            size: 0.055,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            depthWrite: false,
          })
        )
      );

      // ═══════════════════════════════════════════════════════════════════
      // ORGAN PORTALS — Canvas 2D, well-drawn, always visible
      // ═══════════════════════════════════════════════════════════════════
      const OC = document.getElementById("oc");
      OC.width = innerWidth;
      OC.height = innerHeight;
      const OX = OC.getContext("2d");
      let orgT = 0,
        orgAID;

      function proj(wx, wy, wz) {
        const v = new THREE.Vector3(wx, wy, wz);
        v.project(cam3);
        if (v.z >= 1) return null;
        return {
          x: (v.x * 0.5 + 0.5) * OC.width,
          y: (v.y * -0.5 + 0.5) * OC.height,
        };
      }

      // ══ HEART — anatomical, clean ══
      function drawHeart(cx, cy, sz, hex, t, locked) {
        const pulse = Math.sin(t * 2.6) * 0.5 + 0.5;
        const beat = 1 + pulse * 0.08;
        const s = sz * beat * 0.017;
        const al = locked ? 0.38 : 1;
        const [hr, hg, hb] = hexRGB(hex);
        OX.save();
        OX.translate(cx, cy);
        OX.scale(s, s);
        // Drop shadow for depth
        OX.save();
        OX.translate(3, 5);
        OX.globalAlpha = 0.2 * al;
        OX.beginPath();
        heartPath(OX);
        OX.fillStyle = "#000";
        OX.fill();
        OX.restore();
        // Main body gradient
        OX.beginPath();
        heartPath(OX);
        const g = OX.createLinearGradient(-30, -35, 20, 50);
        g.addColorStop(
          0,
          `rgba(${Math.min(255, hr + 70)},${Math.min(255, hg + 30)},${Math.min(
            255,
            hb + 30
          )},${(0.85 + pulse * 0.12) * al})`
        );
        g.addColorStop(
          0.45,
          `rgba(${hr},${hg},${hb},${(0.65 + pulse * 0.1) * al})`
        );
        g.addColorStop(
          1,
          `rgba(${Math.max(0, hr - 55)},${Math.max(0, hg - 20)},${Math.max(
            0,
            hb - 20
          )},${(0.32 + pulse * 0.08) * al})`
        );
        OX.fillStyle = g;
        OX.fill();
        // Glow outline
        if (!locked) {
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${pulse * 0.5 * al})`;
          OX.lineWidth = 9;
          OX.stroke();
        }
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${(0.9 + pulse * 0.1) * al})`;
        OX.lineWidth = 2.2;
        OX.stroke();
        // Highlight sphere (3D)
        const hl = OX.createRadialGradient(-18, -20, 0, -18, -20, 24);
        hl.addColorStop(0, `rgba(255,255,255,${0.38 * al})`);
        hl.addColorStop(1, "transparent");
        OX.fillStyle = hl;
        OX.fill();
        // Aorta
        OX.beginPath();
        OX.moveTo(-4, -5);
        OX.bezierCurveTo(-4, -24, -14, -33, -11, -46);
        OX.bezierCurveTo(-8, -54, 7, -55, 10, -44);
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${
          (0.78 + pulse * 0.18) * al
        })`;
        OX.lineWidth = 6.5;
        OX.lineJoin = "round";
        OX.stroke();
        // Aortic arch
        OX.beginPath();
        OX.arc(-1, -48, 16, Math.PI, 0, false);
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${
          (0.65 + pulse * 0.18) * al
        })`;
        OX.lineWidth = 5.5;
        OX.stroke();
        // Pulmonary artery (blue)
        OX.beginPath();
        OX.moveTo(10, -4);
        OX.bezierCurveTo(22, -20, 34, -26, 37, -18);
        OX.strokeStyle = `rgba(70,140,255,${0.65 * al})`;
        OX.lineWidth = 4.5;
        OX.stroke();
        // Left coronary
        OX.beginPath();
        OX.moveTo(-6, 12);
        OX.bezierCurveTo(-22, 18, -34, 30, -30, 42);
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.32 * al})`;
        OX.lineWidth = 2;
        OX.stroke();
        // Right coronary
        OX.beginPath();
        OX.moveTo(4, 14);
        OX.bezierCurveTo(18, 20, 28, 32, 24, 42);
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.28 * al})`;
        OX.lineWidth = 1.8;
        OX.stroke();
        // Superior vena cava (blue)
        OX.beginPath();
        OX.moveTo(-20, -3);
        OX.bezierCurveTo(-26, -18, -22, -32, -18, -40);
        OX.strokeStyle = `rgba(60,110,230,${0.55 * al})`;
        OX.lineWidth = 4;
        OX.stroke();
        // Ventricle dividing line
        OX.beginPath();
        OX.moveTo(0, -5);
        OX.bezierCurveTo(-2, 10, -1, 28, 0, 50);
        OX.strokeStyle = `rgba(${Math.max(0, hr - 40)},${Math.max(
          0,
          hg - 20
        )},${Math.max(0, hb - 20)},${0.22 * al})`;
        OX.lineWidth = 1.5;
        OX.stroke();
        OX.restore();
      }
      function heartPath(ctx) {
        ctx.moveTo(0, -4);
        ctx.bezierCurveTo(-42, -34, -54, 12, -27, 34);
        ctx.bezierCurveTo(-16, 46, 0, 58, 0, 58);
        ctx.bezierCurveTo(0, 58, 16, 46, 27, 34);
        ctx.bezierCurveTo(54, 12, 42, -34, 0, -4);

      // ══ LUNGS — anatomical, clean ══
      function drawLungs(cx, cy, sz, hex, t, locked) {

        const breath = Math.sin(t * 1.1) * 0.07;

        OX.translate(cx, cy);

        OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.88 * al})`;
        OX.lineWidth = 8.5;
        OX.lineCap = "round";
        OX.stroke();

        OX.beginPath();
        OX.moveTo(0, -20);
        OX.bezierCurveTo(-5, -14, -22, -8, -32, -2);
        OX.moveTo(0, -20);
        OX.bezierCurveTo(5, -14, 22, -8, 32, -2);
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.78 * al})`;
        OX.lineWidth = 6.5;
        OX.stroke();

        OX.save();
        OX.translate(-46, 14);
        OX.scale(ls, ls);

        );
        lgL.addColorStop(
          0.55,

        lgL.addColorStop(

        // ── RIGHT LUNG (slightly bigger) ──
        const rs = 1 + breath * 0.1;
        OX.save();
        OX.translate(46, 14);
        OX.scale(rs, rs);
        OX.beginPath();
        OX.moveTo(-2, -38);
        OX.bezierCurveTo(32, -44, 52, -24, 48, 4);
        OX.bezierCurveTo(46, 28, 36, 50, 18, 57);
        OX.bezierCurveTo(2, 63, -18, 55, -22, 38);
        OX.bezierCurveTo(-26, 20, -20, -10, -2, -38);
        OX.closePath();
        const lgR = OX.createLinearGradient(40, -30, -18, 50);
        lgR.addColorStop(

        OX.restore();

      // ══ CELL (immune) ══
      function drawCell(cx, cy, sz, hex, t, locked) {
        const pulse = Math.sin(t * 1.8) * 0.5 + 0.5;
        const al = locked ? 0.38 : 1;
        const r = sz * 0.65;
        const [hr, hg, hb] = hexRGB(hex);
        OX.save();
        OX.translate(cx, cy);
        // Irregular membrane
        OX.beginPath();
        const pts = 10;
        for (let i = 0; i <= pts; i++) {
          const a = (i / pts) * Math.PI * 2;
          const rr = r * (0.65 + Math.sin(t + i * 1.3) * 0.1);
          OX.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
        }
        OX.closePath();
        const g = OX.createRadialGradient(
          -r * 0.25,
          -r * 0.25,
          r * 0.05,
          -r * 0.25,
          -r * 0.25,
          r * 1.1
        );
        g.addColorStop(
          0,
          `rgba(${Math.min(255, hr + 70)},${Math.min(255, hg + 50)},${Math.min(
            255,
            hb + 50
          )},${(0.72 + pulse * 0.2) * al})`
        );
        g.addColorStop(
          0.55,
          `rgba(${hr},${hg},${hb},${(0.45 + pulse * 0.15) * al})`
        );
        g.addColorStop(1, `rgba(${Math.max(0, hr - 50)},0,0,${0.15 * al})`);
        OX.fillStyle = g;
        OX.fill();
        if (!locked) {
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${pulse * 0.5 * al})`;
          OX.lineWidth = 7;
          OX.stroke();
        }
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${
          (0.85 + pulse * 0.15) * al
        })`;
        OX.lineWidth = 2.2;
        OX.stroke();
        // Nucleus
        OX.beginPath();
        OX.arc(0, 0, r * 0.32, 0, Math.PI * 2);
        const ng = OX.createRadialGradient(
          -r * 0.08,
          -r * 0.08,
          0,
          -r * 0.08,
          -r * 0.08,
          r * 0.35
        );
        ng.addColorStop(
          0,
          `rgba(${Math.min(255, hr + 90)},${Math.min(255, hg + 70)},${Math.min(
            255,
            hb + 70
          )},${0.7 * al})`
        );
        ng.addColorStop(1, `rgba(${hr},${hg},${hb},${0.4 * al})`);
        OX.fillStyle = ng;
        OX.fill();
        OX.strokeStyle = `rgba(${Math.min(255, hr + 50)},${Math.min(
          255,
          hg + 30
        )},${Math.min(255, hb + 30)},${0.6 * al})`;
        OX.lineWidth = 1.5;
        OX.stroke();
        // Organelles
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2 + t * 0.4,
            d = r * 0.52;
          OX.beginPath();
          OX.ellipse(
            Math.cos(a) * d,
            Math.sin(a) * d,
            r * 0.1,
            r * 0.06,
            a,
            0,
            Math.PI * 2
          );
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.45 * al})`;
          OX.lineWidth = 1.2;
          OX.stroke();
        }
        // Highlight
        const hl = OX.createRadialGradient(
          -r * 0.3,
          -r * 0.3,
          0,
          -r * 0.3,
          -r * 0.3,
          r * 0.4
        );
        hl.addColorStop(0, `rgba(255,255,255,${0.35 * al})`);
        hl.addColorStop(1, "transparent");
        OX.fillStyle = hl;
        OX.fill();
        OX.restore();
      }

      // ══ SCAR (cicatrice) ══
      function drawScar(cx, cy, sz, hex, t, locked) {
        const al = locked ? 0.38 : 1;
        const r = sz * 0.6;
        const [hr, hg, hb] = hexRGB(hex);
        OX.save();
        OX.translate(cx, cy);
        // Cracked terrain base
        const bg = OX.createRadialGradient(0, 0, r * 0.1, 0, 0, r);
        bg.addColorStop(
          0,
          `rgba(${Math.max(0, hr - 30)},0,${Math.max(0, hb - 30)},${0.35 * al})`
        );
        bg.addColorStop(1, `rgba(0,0,0,${0.1 * al})`);
        OX.beginPath();
        OX.arc(0, 0, r, 0, Math.PI * 2);
        OX.fillStyle = bg;
        OX.fill();
        // Fracture lines radiating from center
        for (let i = 0; i < 8; i++) {
          const ang = (i / 8) * Math.PI * 2 + t * 0.02;
          let x = 0,
            y = 0;
          OX.beginPath();
          OX.moveTo(0, 0);
          for (let s = 0; s < 5; s++) {
            const jit = (Math.random() - 0.5) * 0.7;
            x += Math.cos(ang + jit) * r * 0.22;
            y += Math.sin(ang + jit) * r * 0.22;
            OX.lineTo(x, y);
          }
          const ps = 0.45 + Math.sin(t * 1.5 + i) * 0.35;
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${ps * al})`;
          OX.lineWidth = 2 + Math.sin(t + i) * 0.6;
          OX.stroke();
          // Crack glow
          OX.strokeStyle = `rgba(${Math.min(255, hr + 60)},${Math.min(
            255,
            hg + 40
          )},${Math.min(255, hb + 60)},${ps * 0.4 * al})`;
          OX.lineWidth = 4;
          OX.stroke();
        }
        // Central wound glow
        const cg = OX.createRadialGradient(0, 0, 0, 0, 0, r * 0.3);
        cg.addColorStop(
          0,
          `rgba(${hr},${hg},${hb},${(0.65 + Math.sin(t * 2) * 0.25) * al})`
        );
        cg.addColorStop(1, `rgba(${hr},${hg},${hb},0)`);
        OX.beginPath();
        OX.arc(0, 0, r * 0.3, 0, Math.PI * 2);
        OX.fillStyle = cg;
        OX.fill();
        if (!locked) {
          const eg = OX.createRadialGradient(0, 0, r * 0.5, 0, 0, r);
          eg.addColorStop(0, `rgba(${hr},${hg},${hb},0)`);
          eg.addColorStop(
            1,
            `rgba(${hr},${hg},${hb},${Math.sin(t * 1.5) * 0.22 * al})`
          );
          OX.beginPath();
          OX.arc(0, 0, r, 0, Math.PI * 2);
          OX.fillStyle = eg;
          OX.fill();
        }
        OX.restore();
      }

      // ══ SYNAPSE ══
      function drawSynapse(cx, cy, sz, hex, t, locked) {
        const al = locked ? 0.38 : 1;
        const r = sz * 0.6;
        const [hr, hg, hb] = hexRGB(hex);
        const nodes = 7;
        OX.save();
        OX.translate(cx, cy);
        const npts = Array.from({ length: nodes }, (_, i) => {
          const a = (i / nodes) * Math.PI * 2 + t * 0.06,
            d = r * 0.58;
          return {
            x: Math.cos(a) * d,
            y: Math.sin(a) * d,
            p: Math.sin(t * 2.2 + i) * 0.5 + 0.5,
          };
        });
        // Connections with signal dots
        npts.forEach((a, i) => {
          npts.forEach((b, j) => {
            if (j <= i) return;
            const sig = Math.sin(t * 3 + i * 1.3 + j * 0.7) * 0.5 + 0.5;
            const alpha2 = (0.1 + sig * 0.25) * al;
            OX.beginPath();
            OX.moveTo(a.x, a.y);
            OX.lineTo(b.x, b.y);
            OX.strokeStyle = `rgba(${hr},${hg},${hb},${alpha2})`;
            OX.lineWidth = 1;
            OX.stroke();
            const prog = (t * 0.8 + i * 0.3 + j * 0.2) % 1;
            const sx = a.x + (b.x - a.x) * prog,
              sy = a.y + (b.y - a.y) * prog;
            OX.beginPath();
            OX.arc(sx, sy, 3, 0, Math.PI * 2);
            OX.fillStyle = `rgba(${Math.min(255, hr + 80)},${Math.min(
              255,
              hg + 60
            )},${Math.min(255, hb + 60)},${sig * 0.9 * al})`;
            OX.fill();
          });
        });
        // Central nucleus
        const cg = OX.createRadialGradient(0, 0, 0, 0, 0, r * 0.22);
        cg.addColorStop(
          0,
          `rgba(${Math.min(255, hr + 80)},${Math.min(255, hg + 60)},${Math.min(
            255,
            hb + 60
          )},${(0.85 + Math.sin(t * 2.5) * 0.15) * al})`
        );
        cg.addColorStop(1, `rgba(${hr},${hg},${hb},${0.4 * al})`);
        OX.beginPath();
        OX.arc(0, 0, r * 0.22, 0, Math.PI * 2);
        OX.fillStyle = cg;
        OX.fill();
        if (!locked) {
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${
            Math.sin(t * 2) * 0.4 * al
          })`;
          OX.lineWidth = 6;
          OX.stroke();
        }
        OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.7 * al})`;
        OX.lineWidth = 1.8;
        OX.stroke();
        // Node spheres
        npts.forEach((n) => {
          const ng = OX.createRadialGradient(
            n.x - 2,
            n.y - 2,
            0,
            n.x,
            n.y,
            7 + n.p * 4
          );
          ng.addColorStop(
            0,
            `rgba(${Math.min(255, hr + 100)},${Math.min(
              255,
              hg + 80
            )},${Math.min(255, hb + 80)},${(0.9 + n.p * 0.1) * al})`
          );
          ng.addColorStop(1, `rgba(${hr},${hg},${hb},${0.4 * al})`);
          OX.beginPath();
          OX.arc(n.x, n.y, 7 + n.p * 4, 0, Math.PI * 2);
          OX.fillStyle = ng;
          OX.fill();
          if (!locked) {
            OX.strokeStyle = `rgba(${hr},${hg},${hb},${n.p * 0.5 * al})`;
            OX.lineWidth = 4;
            OX.stroke();
          }
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.7 * al})`;
          OX.lineWidth = 1.5;
          OX.stroke();
        });
        OX.restore();
      }

      // ══ GALAXY ══
      function drawGalaxy(cx, cy, sz, hex, t, locked) {
        const al = locked ? 0.38 : 1;
        const r = sz * 0.65;
        const [hr, hg, hb] = hexRGB(hex);
        OX.save();
        OX.translate(cx, cy);
        OX.rotate(t * 0.04);
        // Galactic disc
        const gg = OX.createRadialGradient(0, 0, 0, 0, 0, r);
        gg.addColorStop(
          0,
          `rgba(${Math.min(255, hr + 80)},${Math.min(255, hg + 60)},${Math.min(
            255,
            hb + 80
          )},${0.75 * al})`
        );
        gg.addColorStop(0.35, `rgba(${hr},${hg},${hb},${0.45 * al})`);
        gg.addColorStop(
          0.7,
          `rgba(${Math.max(0, hr - 30)},0,${Math.max(0, hb - 20)},${0.2 * al})`
        );
        gg.addColorStop(1, "transparent");
        OX.beginPath();
        OX.ellipse(0, 0, r, r * 0.38, 0, 0, Math.PI * 2);
        OX.fillStyle = gg;
        OX.fill();
        if (!locked) {
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${Math.sin(t) * 0.3 * al})`;
          OX.lineWidth = 6;
          OX.strokeStyle = `rgba(${hr},${hg},${hb},${0.18 * al})`;
          OX.lineWidth = 1;
          OX.stroke();
        }
        // Spiral arms
        for (let arm = 0; arm < 3; arm++) {
          const aOff = arm * ((Math.PI * 2) / 3);
          for (let i = 0; i < 32; i++) {
            const frac = i / 32;
            const a = aOff + frac * Math.PI * 1.6;
            const d = frac * r * 0.85;
            const x = Math.cos(a) * d * 1.1,
              y = Math.sin(a) * d * 0.42;
            const ps = 3 - frac * 2.2;
            const pa = (0.7 - frac * 0.5) * al;
            if (pa < 0.05) break;
            OX.beginPath();
            OX.arc(x, y, Math.max(0.5, ps), 0, Math.PI * 2);
            OX.fillStyle = `rgba(${Math.min(
              255,
              hr + 80 + Math.floor(frac * 30)
            )},${Math.min(255, hg + 60 + Math.floor(frac * 20))},${Math.min(
              255,
              hb + 80
            )},${pa})`;
            OX.fill();
          }
        }
        // Core
        const cg = OX.createRadialGradient(0, 0, 0, 0, 0, r * 0.2);
        cg.addColorStop(0, `rgba(255,255,220,${0.9 * al})`);
        cg.addColorStop(
          0.5,
          `rgba(${Math.min(255, hr + 100)},${Math.min(255, hg + 80)},${Math.min(
            255,
            hb + 100
          )},${0.7 * al})`
        );
        cg.addColorStop(1, `rgba(${hr},${hg},${hb},0)`);
        OX.beginPath();
        OX.arc(0, 0, r * 0.2, 0, Math.PI * 2);
        OX.fillStyle = cg;
        OX.fill();
        // Stars
        for (let i = 0; i < 18; i++) {
          const a = (i / 18) * Math.PI * 2 + t * 0.05 * i;
          const d = r * (0.28 + Math.sin(t * 0.8 + i) * 0.18);
          OX.beginPath();
          OX.arc(Math.cos(a) * d, Math.sin(a) * d * 0.42, 1.8, 0, Math.PI * 2);
          OX.fillStyle = `rgba(255,255,240,${
            (0.6 + Math.sin(t * 3 + i) * 0.3) * al
          })`;
          OX.fill();
        }
        OX.restore();
      }

      function hexRGB(h) {
        return [
          parseInt(h.slice(1, 3), 16),
          parseInt(h.slice(3, 5), 16),
          parseInt(h.slice(5, 7), 16),
        ];
      }

      const DRAW_FN = {
        heart: drawHeart,
        lungs: drawLungs,
        cell: drawCell,
        scar: drawScar,
        synapse: drawSynapse,
        galaxy: drawGalaxy,
      };

      function organLoop() {
        orgT = 0;
        function loop() {
          orgAID = requestAnimationFrame(loop);
          if (PHASE !== "brain") return;
          orgT += 0.016;
          OX.clearRect(0, 0, OC.width, OC.height);
          P.forEach((p, i) => {
            const a = (p.angle * Math.PI) / 180;
            const px = Math.sin(a) * PR,
              pz = Math.cos(a) * PR;
            const sc = proj(px, 0, pz);
            if (!sc) return;
            const dx = cam.x - px,
              dz = cam.z - pz;
            const dist = Math.sqrt(dx * dx + dz * dz);
            const sz = Math.max(60, Math.min(250, 2900 / dist));
            DRAW_FN[p.organ](sc.x, sc.y, sz, p.hex, orgT + i * 0.7, p.locked);
            // Portal number
            OX.save();
            OX.font = `bold ${Math.max(10, sz * 0.1)}px Cinzel,serif`;
            OX.textAlign = "center";
            OX.fillStyle = `${p.hex}${p.locked ? "66" : "cc"}`;
            OX.fillText(p.n, sc.x, sc.y - sz * 0.88);
            if (p.locked) {
              OX.font = `${Math.max(8, sz * 0.08)}px Cinzel,serif`;
              OX.fillStyle = "rgba(180,180,180,.5)";
              OX.fillText("🔒", sc.x, sc.y + sz * 0.88);
            }
            OX.restore();
          });
        }
        loop();
      }

      // Portal detection
      function updatePortals() {
        let minD = 99,
          minI = -1;
        P.forEach((p, i) => {
          const a = (p.angle * Math.PI) / 180;
          const px = Math.sin(a) * PR,
            pz = Math.cos(a) * PR;
          const d = Math.sqrt(
            (cam.x - px) ** 2 + cam.y ** 2 + (cam.z - pz) ** 2
          );
          if (d < minD) {
            minD = d;
            minI = i;
          }
        });
        const near = minD < 4.5 ? minI : -1;
        if (near !== lastNear) {
          lastNear = near;
          nearIdx = near;
          if (near >= 0) {
            showTip(near);
            playChime(180 + near * 22);
            document.getElementById("pen").classList.add("show");
            $c.classList.add("big");
            if (near === 0 && !hrtDialogue) {
              hrtDialogue = true;
              stopVoice();
              setTimeout(
                () =>
                  speak(
                    "Mon cœur... Il bat si fort.\nTrop fort. Trop vite.\nComme en panique constante.\n\nVous allez comprendre...",
                    () => setTimeout(hideVB, 3000)
                  ),
                400
              );
            }
          } else {
            document.getElementById("pt").classList.remove("show");
            document.getElementById("pen").classList.remove("show");
            $c.classList.remove("big");
          }
        }
      }
      function showTip(i) {
        const p = P[i];
        document.getElementById("pic").textContent = p.ic;
        document.getElementById("pnu").textContent = `ORGANE ${p.n}/6`;
        document.getElementById("pna").textContent = p.nm;
        document.getElementById("pna").style.color = p.hex;
        document.getElementById(
          "pta"
        ).style.background = `linear-gradient(90deg,${p.hex},${p.hex}55)`;
        const sb = document.getElementById("pst");
        sb.textContent = p.st;
        sb.className = `pbg ${p.sc}`;
        document.getElementById("pms").textContent = p.ms;
        document.getElementById("pti").style.borderColor = p.hex + "55";
        document.getElementById(
          "pti"
        ).style.boxShadow = `0 8px 50px rgba(0,0,0,.9),0 0 35px ${p.hex}18`;
        const ac = document.getElementById("pac");
        if (!p.locked) {
          ac.textContent = "✓ ACCESSIBLE";
          ac.className = "pac open";
          ac.style.color = p.hex;
          ac.style.borderColor = p.hex + "55";
        } else {
          ac.textContent = `🔒 VERROUILLÉ — STAGE ${i}`;
          ac.className = "pac locked";
        }
        const tip = document.getElementById("pt");
        tip.style.left = "50%";
        tip.style.bottom = "265px";
        tip.style.transform = "translateX(-50%)";
        tip.classList.add("show");
      }

      // ═══════════════════════════════════════════════════════════════════
      // ENTER PORTAL — always works
      // ═══════════════════════════════════════════════════════════════════
      function enterPortal() {
        let minD = 99,
          minI = -1;
        P.forEach((p, i) => {
          const a = (p.angle * Math.PI) / 180;
          const px = Math.sin(a) * PR,
            pz = Math.cos(a) * PR;
          const d = Math.sqrt((cam.x - px) ** 2 + (cam.z - pz) ** 2);
          if (d < minD) {
            minD = d;
            minI = i;
          }
        });
        const tgt = nearIdx >= 0 ? nearIdx : minD < 7 ? minI : -1;
        if (tgt < 0 || entering) return;
        const p = P[tgt];
        if (p.locked) {
          document.getElementById("pti").style.boxShadow =
            "0 0 30px rgba(255,40,40,.8)";
          setTimeout(() => showTip(tgt), 900);
          return;
        }
        entering = true;
        stopVoice();
        if (document.pointerLockElement) document.exitPointerLock();
        document.getElementById("pt").classList.remove("show");
        document.getElementById("pen").classList.remove("show");
        score += 100;
        document.getElementById("sv").textContent = "SCORE : " + score;
        document.getElementById("sd").textContent = score;
        // Begin cinematic transition
        beginVeinTransition();
      }

      // ═══════════════════════════════════════════════════════════════════
      // VEIN TRANSITION — professional, immersive, terrifying
      // Phase 1: aspiration pull (2s) → Phase 2: vein rush (6s) → Phase 3: impact (2s)
      // ═══════════════════════════════════════════════════════════════════
      function beginVeinTransition() {
        // Hide brain UI
        document.getElementById("hud").style.transition = "opacity .6s";
        document.getElementById("hud").style.opacity = "0";
        document.getElementById("pen").style.opacity = "0";
        OC.style.display = "none";
        cancelAnimationFrame(orgAID);

        // Setup vein canvas
        const vc = document.getElementById("vc");
        vc.width = innerWidth;
        vc.height = innerHeight;
        vc.style.display = "block";
        const ekEl = document.getElementById("ek");
        ekEl.width = innerWidth;
        ekEl.height = 72;
        ekEl.style.opacity = "1";
        const ctx = vc.getContext("2d"),
          ekCtx = ekEl.getContext("2d");
        const W = vc.width,
          H = vc.height,
          cx = W / 2,
          cy = H / 2;

        // Start heartbeat
        startHeartbeat();

        // ── VEIN GEOMETRY ──
        const VCOUNT = 30;
        const VEINS = Array.from({ length: VCOUNT }, (_, i) => ({
          angle: (i / VCOUNT) * Math.PI * 2 + Math.random() * 0.12,
          phase: Math.random() * Math.PI * 2,
          thick: Math.random() * 7 + 2.5,
          bulge: Math.random() * 0.45 + 0.78,
          wobble: Math.random() * 0.045 + 0.008,
          isArtery: Math.random() < 0.4, // arteries are brighter
        }));

        // ── BLOOD CELLS ──
        const CELLS = Array.from({ length: 200 }, () => ({
          angle: Math.random() * Math.PI * 2,
          r: Math.random() * 0.9 + 0.05,
          z: Math.random(),
          spd: Math.random() * 0.028 + 0.01,
          sz: Math.random() * 5 + 2,
          isRBC: Math.random() < 0.72,
          wobA: Math.random() * 0.06,
          wobP: Math.random() * Math.PI * 2,
        }));

        // EKG buffer
        const EKG = new Float32Array(260);
        let ekgHead = 0;

        // Fear messages
        const FEARS = [
          "VOUS ÊTES ASPIRÉ...",
          "LE CŒUR VOUS APPELLE",
          "SANS RETOUR POSSIBLE",
          "SENTEZ-VOUS ÇA ?",
        ];
        let fearI = 0;
        const ftEl = document.getElementById("ft");

        // BOOM texts
        const BOOMS = ["BOOM...", "BOOM.", "BOOM!", "💀"];
        let boomI = 0;
        const btEl = document.getElementById("bt");

        let frame = 0;
        const PHASE1 = 50; // aspiration pull
        const PHASE2 = 200; // vein rush
        const PHASE3 = 50; // impact + fade
        const TOTAL = PHASE1 + PHASE2 + PHASE3;

        function draw() {
          frame++;
          const prog = frame / TOTAL;
          const ph1 = Math.min(frame / PHASE1, 1);
          const ph2 =
            frame > PHASE1 ? Math.min((frame - PHASE1) / PHASE2, 1) : 0;
          const ph3 =
            frame > PHASE1 + PHASE2
              ? Math.min((frame - PHASE1 - PHASE2) / PHASE3, 1)
              : 0;
          const bInt = Math.max(6, Math.floor(32 * (1 - ph2 * 0.72)));
          const bPhase = (frame % bInt) / bInt;
          const isBeat = bPhase < 0.14;

          // ══ PHASE 1: ASPIRATION PULL ══
          // Screen warps toward heart portal, everything gets sucked in
          if (ph1 < 1) {
            ctx.clearRect(0, 0, W, H);
            // Dark vignette closing in
            const vg = ctx.createRadialGradient(
              cx,
              cy,
              Math.max(10, (1 - ph1) * Math.min(W, H) * 0.55),
              cx,
              cy,
              Math.max(W, H) * 0.75
            );
            vg.addColorStop(0, "rgba(0,0,0,0)");
            vg.addColorStop(0.7, `rgba(0,0,0,${ph1 * 0.6})`);
            vg.addColorStop(1, "rgba(0,0,0,.96)");
            ctx.fillStyle = vg;
            ctx.fillRect(0, 0, W, H);
            // Suction radial lines (pulling inward)
            const lineCount = Math.floor(ph1 * 80) + 20;
            for (let i = 0; i < lineCount; i++) {
              const a = (i / lineCount) * Math.PI * 2;
              const startR = Math.max(W, H) * 0.7;
              const endR = Math.max(10, (1 - ph1) * 80);
              const x1 = cx + Math.cos(a) * startR,
                y1 = cy + Math.sin(a) * startR;
              const x2 = cx + Math.cos(a) * endR,
                y2 = cy + Math.sin(a) * endR;
              const ln = ctx.createLinearGradient(x1, y1, x2, y2);
              ln.addColorStop(0, "rgba(180,0,0,0)");
              ln.addColorStop(0.6, `rgba(200,20,0,${ph1 * 0.18})`);
              ln.addColorStop(1, `rgba(255,40,0,${ph1 * 0.55})`);
              ctx.strokeStyle = ln;
              ctx.lineWidth = 0.8 + ph1 * 1.2;
              ctx.beginPath();
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
              ctx.stroke();
            }
            // Central glow — the heart calling
            const hg = ctx.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              Math.max(10, (1 - ph1) * 200 + 50)
            );
            hg.addColorStop(0, `rgba(220,0,0,${ph1 * 0.7})`);
            hg.addColorStop(0.4, `rgba(180,0,0,${ph1 * 0.35})`);
            hg.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = hg;
            ctx.fillRect(0, 0, W, H);
            // Heartbeat overlay starts early
            if (ph1 > 0.5) {
              const bo = document.getElementById("bo");
              bo.style.background = `radial-gradient(ellipse at 50%50%,rgba(${
                160 + Math.floor(ph1 * 60)
              },0,0,${isBeat ? ph1 * 0.5 : 0.08 * ph1}) 0%,transparent 65%)`;
              bo.style.opacity = "1";
            }
            if (ph1 < 1) {
              requestAnimationFrame(draw);
              return;
            }
          }

          // ══ PHASE 2: INSIDE VEIN — RUSH ══
          // Background
          ctx.fillStyle = `rgba(0,0,0,${0.13 + ph2 * 0.07})`;
          ctx.fillRect(0, 0, W, H);
          const amb = ctx.createRadialGradient(
            cx,
            cy,
            0,
            cx,
            cy,
            Math.max(W, H) * 0.62
          );
          amb.addColorStop(
            0,
            `rgba(${100 + Math.floor(ph2 * 90)},${Math.floor(
              ph2 * 8
            )},${Math.floor(ph2 * 5)},${0.62 * ph2})`
          );
          amb.addColorStop(
            0.5,
            `rgba(${46 + Math.floor(ph2 * 30)},0,3,${0.44 * ph2})`
          );
          amb.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = amb;
          ctx.fillRect(0, 0, W, H);

          // ── VEIN TUBE — organic, pulsating ──
          const DEPTH = 26;
          for (let z = DEPTH; z > 0; z--) {
            const depth = z / DEPTH;
            const beatBulge = isBeat ? 0.14 * (1 - bPhase / 0.14) : 0;
            // Non-uniform radius — organic wobble
            const baseR =
              Math.min(W, H) *
              0.46 *
              (1 / depth + ph2 * 0.45) *
              (1 + beatBulge * 0.45);
            const alpha = depth * 0.76 * (1 - depth * 0.24);
            const vPulse =
              Math.sin(frame * 0.1 + z * 0.28 + Math.PI * depth) * 0.14 + 0.86;
            const r2 = Math.floor(
              145 + depth * 98 + Math.sin(frame * 0.07 + z) * depth * 14
            );
            const g2 = Math.floor(depth * 10);
            const wx = 1 + Math.sin(frame * 0.038 + z * 0.7) * 0.045,
              wy = 1 + Math.cos(frame * 0.032 + z * 0.55) * 0.045;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(wx, wy);
            ctx.translate(-cx, -cy);
            ctx.beginPath();
            ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${r2},${g2},${g2},${
              alpha * vPulse * 0.62
            })`;
            ctx.lineWidth = 1.8 + depth * 3.2;
            ctx.stroke();
            // Inner arterial membrane
            if (z % 3 === 0) {
              ctx.beginPath();
              ctx.arc(cx, cy, baseR * 0.97, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(255,${Math.floor(
                vPulse * 20
              )},${Math.floor(vPulse * 12)},${alpha * 0.32})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
            ctx.restore();
            // Longitudinal vein fibers
            VEINS.forEach((v) => {
              const wobA =
                v.angle + Math.sin(frame * v.wobble + v.phase) * 0.12;
              const bx = cx + Math.cos(wobA) * baseR,
                by = cy + Math.sin(wobA) * baseR;
              const nextR =
                Math.min(W, H) *
                0.46 *
                (1 / Math.max(depth - 0.06, 0.01) + ph2 * 0.45) *
                (1 + beatBulge * 0.45);
              const nx = cx + Math.cos(wobA) * nextR,
                ny = cy + Math.sin(wobA) * nextR;
              const vA =
                alpha *
                (0.42 + Math.sin(frame * 0.12 + v.phase + depth) * 0.14);
              const vr = v.isArtery
                ? Math.floor(185 + vPulse * 70)
                : Math.floor(150 + vPulse * 65);
              ctx.strokeStyle = `rgba(${vr},${g2},${g2},${vA})`;
              ctx.lineWidth =
                v.thick *
                depth *
                v.bulge *
                vPulse *
                0.92 *
                (1 + beatBulge * 1.3);
              ctx.beginPath();
              ctx.moveTo(bx, by);
              ctx.lineTo(nx, ny);
              ctx.stroke();
              if (v.isArtery) {
                ctx.strokeStyle = `rgba(255,${Math.floor(
                  vPulse * 45
                )},${Math.floor(vPulse * 28)},${vA * 0.6})`;
                ctx.lineWidth = Math.max(0.6, v.thick * 0.3 * depth);
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(nx, ny);
                ctx.stroke();
              }
            });
          }

          // ── BLOOD CELLS rushing past ──
          CELLS.forEach((c) => {
            c.z -= c.spd * (1 + ph2 * 1.3);
            if (c.z < 0) {
              c.z = 1;
              c.angle = Math.random() * Math.PI * 2;
              c.r = Math.random() * 0.9 + 0.05;
            }
            c.angle += Math.sin(frame * 0.04 + c.wobP) * c.wobA;
            const d2 = 1 - c.z;
            const tR = Math.min(W, H) * 0.46 * d2 * (1 + ph2 * 0.45);
            const px = cx + Math.cos(c.angle) * (c.r * tR),
              py = cy + Math.sin(c.angle) * (c.r * tR);
            const csz = c.sz * (1 + d2 * 3.2) * (1 + ph2 * 0.75),
              pA = Math.min(0.95, d2 * 1.4);
            // Motion trail
            const tx = cx + Math.cos(c.angle) * (c.r * tR * (1 + c.spd * 14));
            const ty = cy + Math.sin(c.angle) * (c.r * tR * (1 + c.spd * 14));
            if (c.isRBC) {
              // Red blood cell — biconcave
              const tg = ctx.createLinearGradient(px, py, tx, ty);
              tg.addColorStop(0, `rgba(215,28,28,${pA * 0.9})`);
              tg.addColorStop(1, "rgba(170,0,0,0)");
              ctx.strokeStyle = tg;
              ctx.lineWidth = csz * 0.65;
              ctx.beginPath();
              ctx.moveTo(px, py);
              ctx.lineTo(tx, ty);
              ctx.stroke();
              ctx.save();
              ctx.translate(px, py);
              ctx.rotate(c.angle);
              ctx.beginPath();
              ctx.ellipse(0, 0, csz * 0.72, csz * 0.44, 0, 0, Math.PI * 2);
              const rg = ctx.createRadialGradient(
                -csz * 0.15,
                -csz * 0.1,
                0,
                -csz * 0.15,
                -csz * 0.1,
                csz * 0.75
              );
              rg.addColorStop(0, `rgba(175,10,10,${pA * 0.7})`);
              rg.addColorStop(0.5, `rgba(228,38,38,${pA * 0.88})`);
              rg.addColorStop(1, `rgba(195,18,18,${pA * 0.58})`);
              ctx.fillStyle = rg;
              ctx.fill();
              // Biconcave centre indent
              ctx.beginPath();
              ctx.ellipse(0, 0, csz * 0.28, csz * 0.17, 0, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(130,5,5,${pA * 0.52})`;
              ctx.fill();
              ctx.restore();
            } else {
              // Platelet
              const pg = ctx.createRadialGradient(px, py, 0, px, py, csz * 1.6);
              pg.addColorStop(0, `rgba(255,185,75,${pA * 0.85})`);
              pg.addColorStop(1, "rgba(220,120,25,0)");
              ctx.fillStyle = pg;
              ctx.beginPath();
              ctx.arc(px, py, csz * 1.6, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = `rgba(255,205,105,${pA})`;
              ctx.beginPath();
              ctx.arc(px, py, csz * 0.45, 0, Math.PI * 2);
              ctx.fill();
            }
          });

          // ── HEARTBEAT OVERLAY ──
          const bo = document.getElementById("bo");
          if (isBeat) {
            const bA = ((0.14 - bPhase) / 0.14) * (0.48 + ph2 * 0.52);
            bo.style.background = `radial-gradient(ellipse at 50%50%,rgba(${
              185 + Math.floor(ph2 * 65)
            },0,0,${bA}) 0%,rgba(${100 + Math.floor(ph2 * 40)},0,0,${
              bA * 0.5
            }) 45%,transparent 70%)`;
            bo.style.opacity = "1";
            // Physical screen shake on beat
            if (ph2 > 0.2) {
              const shk = ph2 * 5 + 2;
              vc.style.transform = `translate(${
                (Math.random() - 0.5) * shk
              }px,${(Math.random() - 0.5) * shk}px)`;
              setTimeout(() => (vc.style.transform = ""), 80);
            }
            // Flash on heavy late beats
            if (ph2 > 0.5 && bPhase < 0.04) {
              ctx.fillStyle = `rgba(205,0,0,${0.12 + ph2 * 0.14})`;
              ctx.fillRect(0, 0, W, H);
            }
          } else {
            bo.style.opacity = "0";
          }

          // ── EKG WAVEFORM ──
          EKG[ekgHead] = isBeat
            ? (ph2 > 0.15 ? 3.5 : 2) * (1 - bPhase / 0.14)
            : Math.sin(frame * 0.09 + ekgHead * 0.06) * 0.12;
          ekgHead = (ekgHead + 1) % 260;
          ekCtx.clearRect(0, 0, ekEl.width, 72);
          ekCtx.fillStyle = "rgba(0,0,0,.6)";
          ekCtx.fillRect(0, 0, ekEl.width, 72);
          // Grid
          ekCtx.strokeStyle = "rgba(100,0,0,.25)";
          ekCtx.lineWidth = 0.5;
          for (let i = 0; i < ekEl.width; i += 60) {
            ekCtx.beginPath();
            ekCtx.moveTo(i, 0);
            ekCtx.lineTo(i, 72);
            ekCtx.stroke();
          }
          for (let i = 0; i < 72; i += 18) {
            ekCtx.beginPath();
            ekCtx.moveTo(0, i);
            ekCtx.lineTo(ekEl.width, i);
            ekCtx.stroke();
          }
          // EKG line
          ekCtx.strokeStyle = `rgba(255,${Math.floor(
            40 + ph2 * 20
          )},${Math.floor(30 + ph2 * 10)},${0.58 + ph2 * 0.36})`;
          ekCtx.lineWidth = 2;
          ekCtx.beginPath();
          for (let i = 0; i < 260; i++) {
            const idx = (ekgHead + i) % 260;
            const x = (i / 260) * ekEl.width;
            const y = 36 - EKG[idx] * 24;
            i === 0 ? ekCtx.moveTo(x, y) : ekCtx.lineTo(x, y);
          }
          ekCtx.stroke();
          // BPM
          ekCtx.fillStyle = `rgba(255,50,50,${0.45 + ph2 * 0.35})`;
          ekCtx.font = "bold 9px Cinzel,serif";
          ekCtx.fillText(
            "BPM : " + (52 + Math.floor(ph2 * 120)) + "   ██████████████",
            16,
            14
          );

          // ── FEAR TEXT ──
          if (
            frame % (50 + Math.floor((1 - ph2) * 20)) === 0 &&
            fearI < FEARS.length
          ) {
            ftEl.textContent = FEARS[fearI++];
            ftEl.style.transition = "none";
            ftEl.style.color = `rgba(210,20,20,${0.6 + Math.random() * 0.3})`;
            ftEl.style.letterSpacing = `${0.3 + ph2 * 0.3}em`;
            setTimeout(() => {
              ftEl.style.transition =
                "color 1.4s ease,letter-spacing 1.4s ease";
              ftEl.style.color = "rgba(210,20,20,0)";
              ftEl.style.letterSpacing = ".7em";
            }, 850);
          }

          // ── BLOOD SPRAY STREAKS (late) ──
          if (ph2 > 0.42) {
            const ns = Math.floor((ph2 - 0.42) * 22);
            for (let i = 0; i < ns; i++) {
              const ang = frame * 0.05 * (i + 1) + i * 2.4;
              const sr = Math.min(W, H) * 0.05;
              const er = Math.min(W, H) * 0.56;
              ctx.strokeStyle = `rgba(185,12,12,${0.07 + ph2 * 0.1})`;
              ctx.lineWidth = 0.9 + Math.sin(frame + i) * 0.4;
              ctx.beginPath();
              ctx.moveTo(cx + Math.cos(ang) * sr, cy + Math.sin(ang) * sr);
              ctx.lineTo(cx + Math.cos(ang) * er, cy + Math.sin(ang) * er);
              ctx.stroke();
            }
          }

          // ── BOOM ──
          if ([60, 105, 148, 188].includes(frame) && boomI < BOOMS.length) {
            btEl.textContent = BOOMS[boomI++];
            btEl.style.opacity = "1";
            btEl.style.transform = "translate(-50%,-50%) scale(1.28)";
            btEl.style.transition = "all .04s";
            setTimeout(() => {
              btEl.style.opacity = "0";
              btEl.style.transform = "translate(-50%,-50%) scale(.62)";
              btEl.style.transition = "all .58s ease-out";
            }, 480);
          }

          // ── EDGE VIGNETTE ──
          const vg2 = ctx.createRadialGradient(
            cx,
            cy,
            Math.min(W, H) * 0.08,
            cx,
            cy,
            Math.max(W, H) * 0.68
          );
          vg2.addColorStop(0, "rgba(0,0,0,0)");
          vg2.addColorStop(1, `rgba(0,0,0,${0.65 + ph2 * 0.3})`);
          ctx.fillStyle = vg2;
          ctx.fillRect(0, 0, W, H);

          // ══ PHASE 3: IMPACT + WHITOUT ══
          if (ph3 > 0) {
            // Screen goes deep red then white flash then black
            if (ph3 < 0.4) {
              ctx.fillStyle = `rgba(150,0,0,${ph3 * 2})`;
              ctx.fillRect(0, 0, W, H);
            } else if (ph3 < 0.65) {
              ctx.fillStyle = `rgba(255,${Math.floor(
                ((ph3 - 0.4) / 0.25) * 200
              )},${Math.floor(((ph3 - 0.4) / 0.25) * 200)},${
                (ph3 - 0.4) / 0.25
              })`;
              ctx.fillRect(0, 0, W, H);
            } else {
              ctx.fillStyle = `rgba(0,0,0,${(ph3 - 0.65) / 0.35})`;
              ctx.fillRect(0, 0, W, H);
            }
            btEl.style.opacity = "0";
            bo.style.opacity = "0";
            if (ph3 >= 0.5 && !vc.dataset.fading) {
              vc.dataset.fading = "1";
              ekEl.style.transition = "opacity .5s";
              ekEl.style.opacity = "0";
              ftEl.style.color = "transparent";
              const curt = document.getElementById("curtain");
              curt.style.transition = "opacity 1.8s ease";
              curt.classList.remove("gone");
              curt.style.opacity = "1";
            }
          }

          if (frame < TOTAL) {
            requestAnimationFrame(draw);
          } else {
            if (_hb) clearTimeout(_hb);
            try {
              window._dr?.o.stop();
              window._ws?.s.stop();
            } catch (e) {}
            setTimeout(() => {
              try {
                localStorage.setItem("gaiaPlayerName", pName);
              } catch (e) {}
              window.location.href = "scene4.html";
            }, 1800);
          }
        }
        requestAnimationFrame(draw);
      }

      // MINIMAP
      const mmC = document.getElementById("mc"),
        mmX = mmC.getContext("2d");
      function drawMM() {
        const W = 118,
          H = 118,
          cx = W / 2,
          cy = H / 2,
          R = W / 2 - 5;
        mmX.clearRect(0, 0, W, H);
        mmX.fillStyle = "rgba(0,5,2,.92)";
        mmX.beginPath();
        mmX.arc(cx, cy, R, 0, Math.PI * 2);
        mmX.fill();
        mmX.strokeStyle = "rgba(0,255,136,.18)";
        mmX.lineWidth = 1.5;
        mmX.beginPath();
        mmX.arc(cx, cy, R, 0, Math.PI * 2);
        mmX.stroke();
        const cg = mmX.createRadialGradient(cx, cy, 0, cx, cy, 10);
        cg.addColorStop(0, "rgba(80,150,255,.95)");
        cg.addColorStop(1, "rgba(80,150,255,0)");
        mmX.fillStyle = cg;
        mmX.beginPath();
        mmX.arc(cx, cy, 10, 0, Math.PI * 2);
        mmX.fill();
        P.forEach((p, i) => {
          const a = (p.angle * Math.PI) / 180,
            mx = cx + Math.sin(a) * R * 0.8,
            my = cy + Math.cos(a) * R * 0.8;
          mmX.beginPath();
          mmX.moveTo(cx, cy);
          mmX.lineTo(mx, my);
          mmX.strokeStyle = p.hex + "28";
          mmX.lineWidth = 0.5;
          mmX.stroke();
          const isN = nearIdx === i;
          mmX.beginPath();
          mmX.arc(mx, my, isN ? 7 : 4.5, 0, Math.PI * 2);
          mmX.fillStyle = isN
            ? p.hex
            : p.locked
            ? "rgba(80,80,80,.5)"
            : p.hex + "aa";
          mmX.fill();
          if (isN) {
            mmX.strokeStyle = p.hex;
            mmX.lineWidth = 1.8;
            mmX.beginPath();
            mmX.arc(mx, my, 10, 0, Math.PI * 2);
            mmX.stroke();
          }
        });
        const ppx = cx + (cam.x / PR) * R * 0.8,
          ppy = cy + (cam.z / PR) * R * 0.8;
        const dd = Math.sqrt((ppx - cx) ** 2 + (ppy - cy) ** 2);
        const fx = dd > R - 6 ? cx + ((ppx - cx) * (R - 6)) / dd : ppx,
          fy = dd > R - 6 ? cy + ((ppy - cy) * (R - 6)) / dd : ppy;
        mmX.fillStyle = "#fff";
        mmX.beginPath();
        mmX.arc(fx, fy, 3.5, 0, Math.PI * 2);
        mmX.fill();
        mmX.strokeStyle = "rgba(255,255,255,.75)";
        mmX.lineWidth = 1.5;
        mmX.beginPath();
        mmX.moveTo(fx, fy);
        mmX.lineTo(fx + Math.sin(-cam.yaw) * 10, fy + Math.cos(-cam.yaw) * 10);
        mmX.stroke();
      }

      // RENDER LOOP
      function loop3() {
        requestAnimationFrame(loop3);
        if (PHASE === "tunnel") return;
        const dt = Math.min(clk3.getDelta(), 0.05);
        BD.time += dt;
        const t = BD.time;
        if (BD.zoom) {
          BD.zt += dt * 1.2;
          const pg = Math.min(BD.zt / 3, 1);
          cam3.fov = 120 - 45 * pg;
          cam3.updateProjectionMatrix();
          if (pg >= 1) {
            BD.zoom = false;
            cam3.fov = 75;
            cam3.updateProjectionMatrix();
          }
        }
        moveCam(dt);
        if (PHASE === "brain" && !entering) {
          updatePortals();
          drawMM();
        }
        mMat.uniforms.uT.value = t;
        aMat.uniforms.uT.value = t;
        mSph.rotation.y = t * 0.05;
        mSph.rotation.x = Math.sin(t * 0.3) * 0.04;
        cL.intensity = 2 + Math.sin(t * 2.2) * 0.8;
        gL.intensity = 1 + Math.sin(t * 1.8 + 1) * 0.6;
        nMat.uniforms.uT.value = t;
        sMat.uniforms.uT.value = t;
        nLines.forEach(({ mat, base }, i) => {
          mat.opacity = base * (Math.sin(t * 0.65 + i * 0.5) * 0.45 + 0.6);
        });
        rdr3.render(sc3, cam3);
      }

      function brainVoice() {
        setTimeout(() => {
          speak(
            `Bienvenue dans mon esprit... ${pName}.\nVoici le centre de ma conscience.\nD'ici... je contrôle tout mon corps.\n\nChaque portail mène à un organe vital.\nMes systèmes sont malades.\nCertains au bord de l'effondrement.\n\nCommencez par mon CŒUR.\nC'est là que tout commence...\nC'est là que tout peut finir.`,
            () => setTimeout(hideVB, 4000)
          );
        }, 1200);
      }

      function init() {
        initAudio();
        const b = document.getElementById("bf");
        b.style.background = "#00ff88";
        b.style.opacity = ".9";
        setTimeout(() => {
          b.style.transition = "opacity .65s";
          b.style.opacity = "0";
        }, 70);
        showTL(0);
        setTimeout(() => playTunnel(), 400);
        const cu = document.getElementById("curtain");
        cu.style.transition = "opacity 1.1s ease";
        setTimeout(() => cu.classList.add("gone"), 100);
        loop3();
        requestAnimationFrame(tunnelFr);
      }
      window.addEventListener("load", init);
      window.addEventListener("resize", () => {
        TC.width = innerWidth;
        TC.height = innerHeight;
        BC.width = innerWidth;
        BC.height = innerHeight;
        OC.width = innerWidth;
        OC.height = innerHeight;
        rdr3.setSize(innerWidth, innerHeight);
        cam3.aspect = innerWidth / innerHeight;
        cam3.updateProjectionMatrix();
      });
    </script>
  </body>
